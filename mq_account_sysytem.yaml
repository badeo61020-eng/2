/**
 * 商品コード列を含むシートを探す
 */
function findProductCodeSheets() {
  try {
    Logger.log('=== 商品コード列を含むシート検索 ===');
    
    const ss = SpreadsheetApp.getActiveSpreadsheet();
    const sheets = ss.getSheets();
    
    Logger.log(`\n総シート数: ${sheets.length}`);
    
    const productCodeSheets = [];
    
    sheets.forEach(sheet => {
      const sheetName = sheet.getName();
      const data = sheet.getDataRange().getValues();
      
      if (data.length === 0) {
        return;
      }
      
      const headers = data[0];
      const hasProductCode = headers.some(h => 
        String(h).includes('商品コード') || 
        String(h).includes('SKU') || 
        String(h).includes('品番')
      );
      
      if (hasProductCode) {
        productCodeSheets.push({
          name: sheetName,
          headers: headers,
          rowCount: data.length - 1
        });
        
        Logger.log(`\n✅ "${sheetName}"`);
        Logger.log(`   データ行数: ${data.length - 1}行`);
        Logger.log(`   ヘッダー: [${headers.join(', ')}]`);
      }
    });
    
    Logger.log(`\n=== 検索完了: ${productCodeSheets.length}シート ===`);
    
    if (productCodeSheets.length === 0) {
      Logger.log('\n❌ 商品コード列を含むシートが見つかりませんでした');
    } else {
      Logger.log('\n【推奨シート】');
      productCodeSheets.forEach(s => {
        Logger.log(`- ${s.name} (${s.rowCount}行)`);
      });
    }
    
  } catch (error) {
    Logger.log('❌ エラー: ' + error.message);
  }
}

/**
 * 在庫データとMQ分析の商品コード照合
 */
function diagnoseProductCodeMatching() {
  try {
    Logger.log('=== 商品コード照合診断開始 ===');
    
    const ss = SpreadsheetApp.getActiveSpreadsheet();
    
    // 在庫データから商品コードを取得
    Logger.log('\n【1. 在庫データ（週次のみ）】');
    const inventorySheet = ss.getSheetByName('在庫データ');
    const inventoryData = inventorySheet.getDataRange().getValues();
    const inventoryHeaders = inventoryData[0];
    
    const colDate = inventoryHeaders.indexOf('計測日');
    const colPeriodType = inventoryHeaders.indexOf('期間タイプ');
    const colProductCode = inventoryHeaders.indexOf('商品コード');
    const colProductName = inventoryHeaders.indexOf('商品名');
    const colQuantity = inventoryHeaders.indexOf('在庫数');
    
    const inventoryCodes = new Set();
    const sampleInventory = [];
    
    inventoryData.slice(1).forEach((row, index) => {
      if (row[colPeriodType] === '週次' && row[colProductCode]) {
        inventoryCodes.add(String(row[colProductCode]).trim());
        
        if (sampleInventory.length < 5) {
          sampleInventory.push({
            code: String(row[colProductCode]).trim(),
            name: row[colProductName],
            qty: row[colQuantity]
          });
        }
      }
    });
    
    Logger.log(`在庫データの商品数: ${inventoryCodes.size}商品`);
    Logger.log(`サンプル（最初の5商品）:`);
    sampleInventory.forEach(item => {
      Logger.log(`  商品コード: "${item.code}" | 商品名: "${item.name}" | 在庫数: ${item.qty}`);
    });
    
    // MQ分析から商品コードを取得
    Logger.log('\n【2. MQ分析データ】');
    const mqSheet = ss.getSheetByName('MQ分析');
    const mqData = mqSheet.getDataRange().getValues();
    const mqHeaders = mqData[0];
    
    const mqColProductCode = mqHeaders.indexOf('商品コード');
    const mqColProductName = mqHeaders.indexOf('商品名');
    
    const mqCodes = new Set();
    const sampleMQ = [];
    
    mqData.slice(1).forEach((row, index) => {
      if (row[mqColProductCode]) {
        mqCodes.add(String(row[mqColProductCode]).trim());
        
        if (sampleMQ.length < 5) {
          sampleMQ.push({
            code: String(row[mqColProductCode]).trim(),
            name: row[mqColProductName]
          });
        }
      }
    });
    
    Logger.log(`MQ分析の商品数: ${mqCodes.size}商品`);
    Logger.log(`サンプル（最初の5商品）:`);
    sampleMQ.forEach(item => {
      Logger.log(`  商品コード: "${item.code}" | 商品名: "${item.name}"`);
    });
    
    // 照合
    Logger.log('\n【3. 照合結果】');
    
    // 在庫データにあってMQ分析にない商品
    const onlyInInventory = [...inventoryCodes].filter(code => !mqCodes.has(code));
    Logger.log(`在庫データのみに存在: ${onlyInInventory.length}商品`);
    if (onlyInInventory.length > 0 && onlyInInventory.length <= 10) {
      Logger.log(`  商品コード: [${onlyInInventory.join(', ')}]`);
    }
    
    // MQ分析にあって在庫データにない商品
    const onlyInMQ = [...mqCodes].filter(code => !inventoryCodes.has(code));
    Logger.log(`MQ分析のみに存在: ${onlyInMQ.length}商品`);
    if (onlyInMQ.length > 0 && onlyInMQ.length <= 10) {
      Logger.log(`  商品コード: [${onlyInMQ.join(', ')}]`);
    }
    
    // 両方に存在する商品
    const common = [...inventoryCodes].filter(code => mqCodes.has(code));
    Logger.log(`両方に存在: ${common.length}商品`);
    
    // 具体的な例を確認
    Logger.log('\n【4. 具体例の詳細確認】');
    const testCode1 = sampleInventory[0]?.code;
    if (testCode1) {
      Logger.log(`\nテストケース1: "${testCode1}"`);
      Logger.log(`  在庫データに存在: ${inventoryCodes.has(testCode1) ? 'YES' : 'NO'}`);
      Logger.log(`  MQ分析に存在: ${mqCodes.has(testCode1) ? 'YES' : 'NO'}`);
      Logger.log(`  文字列長: ${testCode1.length}`);
      Logger.log(`  文字コード: [${Array.from(testCode1).map(c => c.charCodeAt(0)).join(', ')}]`);
    }
    
    Logger.log('\n=== 診断完了 ===');
    
  } catch (error) {
    Logger.log('❌ 診断エラー: ' + error.message);
    Logger.log('スタックトレース: ' + error.stack);
  }
}

/**
 * MQ会計システムのデータ整合性診断
 */
function diagnoseMQSystemIntegrity() {
  try {
    Logger.log('=== MQ会計システム整合性診断開始 ===');
    
    const ss = SpreadsheetApp.getActiveSpreadsheet();
    
    // 1. 日次決算シート
    Logger.log('\n【1. 日次決算シート】');
