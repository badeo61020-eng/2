/**
 * Section 11: フォーマット関数
 * 商品別MQ分析シートのフォーマット (修正版)
 */
function formatProductMQAnalysis() {
  const ss = SpreadsheetApp.getActiveSpreadsheet();
  const sheet = ss.getSheetByName(MQ_CONFIG.SHEETS.PRODUCT_MQ_ANALYSIS);
  
  if (!sheet) return;
  
  const lastRow = sheet.getLastRow();
  if (lastRow < 2) return;
  
  // ヘッダー行のフォーマット
  const headerRange = sheet.getRange(1, 1, 1, 8);
  headerRange.setBackground('#FF9800')
    .setFontColor('#FFFFFF')
    .setFontWeight('bold')
    .setHorizontalAlignment('center');
  
  // データ範囲のフォーマット
  const dataRange = sheet.getRange(2, 1, lastRow - 1, 8);
  
  // 全体の基本フォーマット
  dataRange.setVerticalAlignment('middle');
  
  // 列ごとの配置
  sheet.getRange(2, 1, lastRow - 1, 2).setHorizontalAlignment('left');   // 商品コード、商品名
  sheet.getRange(2, 3, lastRow - 1, 5).setHorizontalAlignment('right');  // Q, P, V, MQ
  sheet.getRange(2, 7, lastRow - 1, 1).setHorizontalAlignment('right');  // MQ率
  sheet.getRange(2, 8, lastRow - 1, 1).setHorizontalAlignment('center'); // ランク
  
  // 数値フォーマット
  sheet.getRange(2, 3, lastRow - 1, 1).setNumberFormat('#,##0');     // Q
  sheet.getRange(2, 4, lastRow - 1, 1).setNumberFormat('#,##0');     // P
  sheet.getRange(2, 5, lastRow - 1, 1).setNumberFormat('#,##0');     // V
  sheet.getRange(2, 6, lastRow - 1, 1).setNumberFormat('#,##0');     // MQ
  
  // 【重要】MQ率を正しくパーセント表示
  sheet.getRange(2, 7, lastRow - 1, 1).setNumberFormat('0.00%');
  
  // ランク別の色分け
  const rankRange = sheet.getRange(2, 8, lastRow - 1, 1);
  const ranks = rankRange.getValues();
  
  for (let i = 0; i < ranks.length; i++) {
    const cell = sheet.getRange(i + 2, 8);
    const rank = ranks[i][0];
    
    switch(rank) {
      case 'S':
        cell.setBackground('#4CAF50').setFontColor('#FFFFFF').setFontWeight('bold');
        break;
      case 'A':
        cell.setBackground('#8BC34A').setFontColor('#FFFFFF').setFontWeight('bold');
        break;
      case 'B':
        cell.setBackground('#FFC107').setFontColor('#FFFFFF').setFontWeight('bold');
        break;
      case 'C':
        cell.setBackground('#FF9800').setFontColor('#FFFFFF').setFontWeight('bold');
        break;
      case 'D':
        cell.setBackground('#F44336').setFontColor('#FFFFFF').setFontWeight('bold');
        break;
    }
  }
  
  // 列幅の自動調整
  sheet.autoResizeColumns(1, 8);
  
  // 固定表示
  sheet.setFrozenRows(1);
  
  Logger.log('商品別MQ分析シートのフォーマット完了');
}


