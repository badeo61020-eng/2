    }
    
    const endTime = new Date();
    const elapsedTime = (endTime - startTime) / 1000;
    
    Logger.log('=== 固定費確定後の再計算が完了 ===');
    Logger.log(`処理時間: ${elapsedTime.toFixed(1)}秒`);
    Logger.log('更新対象:');
    Logger.log('  ✓ 月次累積分析');
    Logger.log('  ✓ 月次損益分岐点');
    Logger.log('  ✓ 月次サマリー');
