  const colMqQuantity = mqHeaders.indexOf('Q(販売数量)');
  const colMqSales = mqHeaders.indexOf('P（売上金額）');
  const colMqVariableCost = mqHeaders.indexOf('V（変動費）');
  const colMqMQ = mqHeaders.indexOf('MQ');
  
  let mqRepaired = 0;
  
  for (let i = 1; i < mqData.length; i++) {
    const row = mqData[i];
    const vValue = String(row[colMqVariableCost]);
    
    if (vValue.includes('#NUM!')) {
      const code = String(row[colMqCode]).trim();
      const quantity = Number(row[colMqQuantity]) || 0;
      const sales = Number(row[colMqSales]) || 0;
      const cost = productMaster[code];
      
      if (cost) {
        const variableCost = quantity * cost;
        const mq = sales - variableCost;
        
        mqSheet.getRange(i + 1, colMqVariableCost + 1).setValue(variableCost);
        mqSheet.getRange(i + 1, colMqMQ + 1).setValue(mq);
        mqRepaired++;
      }
