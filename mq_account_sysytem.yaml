/**
 * MQ分析シートの#NUM!エラーを直接修復（関数名不要版）
 */
function repairMQAnalysisDataDirect() {
  console.log('=== MQ分析シート直接修復開始 ===');
  
  const ss = SpreadsheetApp.getActiveSpreadsheet();
  
  // 1. 商品マスターを読み込み
  console.log('📊 商品マスター読込...');
  const pmSheet = ss.getSheetByName('商品マスター');
  
  if (!pmSheet) {
    console.error('❌ 商品マスターシートが見つかりません');
    return;
  }
  
  const pmData = pmSheet.getDataRange().getValues();
  const pmHeaders = pmData[0];
  
  const colPmCode = pmHeaders.indexOf('商品コード');
  const colPmCost = pmHeaders.indexOf('V(原価)');
  
  console.log(`商品マスター列: 商品コード=${colPmCode}, V(原価)=${colPmCost}`);
  
  const productMaster = {};
  for (let i = 1; i < pmData.length; i++) {
    const code = String(pmData[i][colPmCode]).trim();
    const cost = Number(pmData[i][colPmCost]);
    if (code && !isNaN(cost) && cost > 0) {
      productMaster[code] = cost;
    }
  }
  
  console.log(`✅ 商品マスター: ${Object.keys(productMaster).length}商品`);
  
  // 2. MQ分析シートを読み込み
  console.log('\n📊 MQ分析シート読込...');
  const mqSheet = ss.getSheetByName('MQ分析');
  
  if (!mqSheet) {
    console.error('❌ MQ分析シートが見つかりません');
    return;
  }
  
  const mqData = mqSheet.getDataRange().getValues();
  const mqHeaders = mqData[0];
  
  const colCode = mqHeaders.indexOf('商品コード');
  const colQuantity = mqHeaders.indexOf('Q(販売数量)');
  const colSales = mqHeaders.indexOf('P（売上金額）');
  const colVariableCost = mqHeaders.indexOf('V（変動費）');
  const colMQ = mqHeaders.indexOf('MQ');
  
  console.log(`MQ分析列: 商品コード=${colCode}, Q=${colQuantity}, P=${colSales}, V=${colVariableCost}, MQ=${colMQ}`);
  console.log(`📊 MQ分析データ: ${mqData.length - 1}行`);
  
  // 3. #NUM!エラーをカウント
  let errorCount = 0;
  for (let i = 1; i < mqData.length; i++) {
    const vValue = String(mqData[i][colVariableCost]);
    if (vValue.includes('#NUM!')) {
      errorCount++;
    }
  }
  
  console.log(`\n🔍 #NUM!エラー: ${errorCount}行`);
  
  if (errorCount === 0) {
    console.log('✅ 修復が必要なデータはありません');
    console.log('=== 修復完了 ===');
    return;
  }
  
  // 4. #NUM!エラーを修復（バッチ処理）
  console.log(`\n🔧 修復開始...`);
  
  const batchSize = 100; // 100行ずつ処理
  let repairedCount = 0;
  let notFoundCount = 0;
  
  for (let startRow = 1; startRow < mqData.length; startRow += batchSize) {
    const endRow = Math.min(startRow + batchSize, mqData.length);
    const batchData = [];
    
    for (let i = startRow; i < endRow; i++) {
      const row = mqData[i];
      const vValue = String(row[colVariableCost]);
      
      // #NUM!エラーがある場合のみ修復
      if (vValue.includes('#NUM!')) {
        const code = String(row[colCode]).trim();
        const quantity = Number(row[colQuantity]) || 0;
        const sales = Number(row[colSales]) || 0;
        
        const cost = productMaster[code];
        
        if (cost) {
          const variableCost = quantity * cost;
          const mq = sales - variableCost;
          
          batchData.push({
            row: i + 1,
            variableCost: variableCost,
            mq: mq
          });
          
          repairedCount++;
        } else {
          notFoundCount++;
          console.warn(`⚠️ 商品マスターに未登録: ${code} (行${i + 1})`);
        }
      }
    }
    
    // バッチ更新
    if (batchData.length > 0) {
      batchData.forEach(update => {
        mqSheet.getRange(update.row, colVariableCost + 1).setValue(update.variableCost);
        mqSheet.getRange(update.row, colMQ + 1).setValue(update.mq);
      });
      
      console.log(`  処理済み: ${startRow}〜${endRow}行 (修復: ${batchData.length}件)`);
    }
  }
  
  console.log(`\n✅ 修復完了: ${repairedCount}行`);
  if (notFoundCount > 0) {
    console.log(`⚠️ 商品マスター未登録: ${notFoundCount}行（これらは修復できませんでした）`);
  }
  
  console.log('\n=== MQ分析シート修復完了 ===');
  console.log('次のステップ: メニューから「集計シート再計算」を実行してください');
}

