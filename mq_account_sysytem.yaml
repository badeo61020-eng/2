    Logger.log('月次サマリーを再計算中...');
    executeMonthlyMySummary();  // ← 修正
    
    Logger.log('年度損益分岐点を再計算中...');
    executeAnnualBreakevenAnalysis();  // ← 修正
    
    // 該当シートのフォーマット
