/**
 * 複数拠点の在庫データを統合（簡易版）
 */
function consolidateInventory() {
  try {
    const startTime = Date.now();
    Logger.log('=== 在庫統合処理開始 ===');
    
    const ss = SpreadsheetApp.getActiveSpreadsheet();
    const inputSheet = ss.getSheetByName(MQ_CONFIG.SHEETS.INVENTORY_INPUT);
    
    if (!inputSheet) {
      throw new Error('在庫データ入力シートが見つかりません。先に初期化を実行してください。');
    }
    
    // 計測日と期間タイプを入力ダイアログで取得
    const ui = SpreadsheetApp.getUi();
    
    // 計測日を入力
    const dateResponse = ui.prompt(
      '計測日を入力',
      '計測日を入力してください（例: 2026/01/11）',
      ui.ButtonSet.OK_CANCEL
    );
    
    if (dateResponse.getSelectedButton() !== ui.Button.OK) {
      Logger.log('❌ ユーザーがキャンセルしました');
      return;
    }
    
    const dateStr = dateResponse.getResponseText().trim();
    
    // 期間タイプを選択
    const periodResponse = ui.prompt(
      '期間タイプを入力',
      '期間タイプを入力してください（例: 週次 or 月次）',
      ui.ButtonSet.OK_CANCEL
    );
    
    if (periodResponse.getSelectedButton() !== ui.Button.OK) {
      Logger.log('❌ ユーザーがキャンセルしました');
      return;
    }
    
    const periodType = periodResponse.getResponseText().trim();
    
    Logger.log(`📅 計測日: ${dateStr}`);
    Logger.log(`📊 期間タイプ: ${periodType}`);
    
    // データ読み込み
    const data = inputSheet.getDataRange().getValues();
    const headers = data[0];
    const rows = data.slice(1);
    
    Logger.log(`📊 読み込みデータ: ${rows.length}行`);
    
    if (rows.length === 0) {
      throw new Error('在庫データが入力されていません。');
    }
    
    // 商品マスターを読み込み（商品名取得用）
    const productMaster = loadProductMaster();
    
    // データを集計（商品コード別に合算）
    const consolidated = {};
    
    rows.forEach((row, index) => {
      const productCode = String(row[0]).trim();
      const quantity = Number(row[1]) || 0;
      
      // 空行をスキップ
      if (!productCode || productCode === '' || productCode === '商品コード') {
        return;
      }
      
      // 商品コード別に合算
      if (!consolidated[productCode]) {
        consolidated[productCode] = {
          productCode: productCode,
          quantity: 0
        };
      }
      
      consolidated[productCode].quantity += quantity;
      
      Logger.log(`${index + 1}行目: ${productCode} | ${quantity}個 → 累計: ${consolidated[productCode].quantity}個`);
    });
    
    Logger.log(`✅ 集計完了: ${Object.keys(consolidated).length}商品`);
    
    // 統合在庫データシートに出力
    outputConsolidatedInventory(consolidated, productMaster, dateStr, periodType);
    
    const elapsedTime = ((Date.now() - startTime) / 1000).toFixed(1);
    Logger.log(`=== 在庫統合処理完了: ${elapsedTime}秒 ===`);
    
    SpreadsheetApp.getActiveSpreadsheet().toast(
      `在庫統合完了: ${Object.keys(consolidated).length}商品 / 処理時間: ${elapsedTime}秒\n\n「統合在庫データ」シートの内容を「在庫データ」シートにコピー＆ペーストしてください。`,
      '統合完了',
      10
    );
    
    return {
      success: true,
      count: Object.keys(consolidated).length,
      elapsedTime: elapsedTime
    };
    
  } catch (error) {
    Logger.log('❌ エラー: ' + error.message);
    Logger.log('スタックトレース: ' + error.stack);
    
    SpreadsheetApp.getActiveSpreadsheet().toast(
      'エラーが発生しました: ' + error.message,
      'エラー',
      10
    );
    
    throw error;
  }
}

/**
 * 統合在庫データをシートに出力
 */
function outputConsolidatedInventory(consolidated, productMaster, dateStr, periodType) {
  try {
    Logger.log('📝 統合在庫データ出力開始');
    
    const ss = SpreadsheetApp.getActiveSpreadsheet();
    let sheet = ss.getSheetByName(MQ_CONFIG.SHEETS.INVENTORY_CONSOLIDATED);
    
    // シートが存在しない場合は新規作成
    if (!sheet) {
      sheet = ss.insertSheet(MQ_CONFIG.SHEETS.INVENTORY_CONSOLIDATED);
      Logger.log('✅ 統合在庫データシートを新規作成');
    } else {
      sheet.clear();
      Logger.log('✅ 既存シートをクリア');
    }
    
    // ヘッダー行を作成
    const headers = ['計測日', '期間タイプ', '商品コード', '商品名', '在庫数'];
    sheet.getRange(1, 1, 1, headers.length).setValues([headers]);
    
    // ヘッダーの書式設定
    sheet.getRange(1, 1, 1, headers.length)
      .setBackground('#4A90E2')
      .setFontColor('#FFFFFF')
      .setFontWeight('bold')
      .setHorizontalAlignment('center');
    
    // 説明文を追加
    sheet.getRange(1, 7).setValue('【次のステップ】');
    sheet.getRange(2, 7).setValue('このデータを全選択してコピー（ヘッダー行を除く）');
    sheet.getRange(3, 7).setValue('↓');
    sheet.getRange(4, 7).setValue('「在庫データ」シートの末尾に貼り付け');
    sheet.getRange(5, 7).setValue('↓');
    sheet.getRange(6, 7).setValue('「週次在庫回転率計算」または「月次在庫回転率計算」を実行');
    
    // データ行を作成
    const outputData = [];
    
    // 商品コード順にソート
    const sortedKeys = Object.keys(consolidated).sort();
    
    sortedKeys.forEach(productCode => {
      const item = consolidated[productCode];
      
      // 商品マスターから商品名を取得
      const productName = productMaster[productCode]?.name || productCode;
      
      const row = [
        dateStr,              // 計測日
        periodType,           // 期間タイプ
        item.productCode,     // 商品コード
        productName,          // 商品名
        item.quantity         // 在庫数
      ];
      
      outputData.push(row);
    });
    
    // データを出力
    if (outputData.length > 0) {
      sheet.getRange(2, 1, outputData.length, headers.length).setValues(outputData);
      Logger.log(`✅ ${outputData.length}行のデータを出力`);
    }
    
    // 列幅を調整
    sheet.setColumnWidth(1, 120);  // 計測日
    sheet.setColumnWidth(2, 100);  // 期間タイプ
    sheet.setColumnWidth(3, 150);  // 商品コード
    sheet.setColumnWidth(4, 200);  // 商品名
    sheet.setColumnWidth(5, 100);  // 在庫数
    sheet.setColumnWidth(7, 400);  // 説明文
    
    // 在庫数列のフォーマット
    sheet.getRange(2, 5, outputData.length, 1).setNumberFormat('#,##0');
    
    // 在庫数列を太字に
    sheet.getRange(2, 5, outputData.length, 1)
      .setFontWeight('bold')
      .setBackground('#E8F4F8');
    
    // ヘッダー行を固定
    sheet.setFrozenRows(1);
    
    // データ範囲を選択状態にする（コピーしやすいように）
    sheet.setActiveRange(sheet.getRange(2, 1, outputData.length, headers.length));
    
    Logger.log('✅ 統合在庫データ出力完了');
    
  } catch (error) {
    Logger.log('❌ 出力エラー: ' + error.message);
    throw error;
  }
}

/**
 * 商品マスターを読み込み
 */
function loadProductMaster() {
  try {
    const ss = SpreadsheetApp.getActiveSpreadsheet();
    const sheet = ss.getSheetByName(MQ_CONFIG.SHEETS.PRODUCT_MASTER);
    
    if (!sheet) {
      Logger.log('⚠️ 商品マスターシートが見つかりません');
      return {};
    }
    
    const data = sheet.getDataRange().getValues();
    const headers = data[0];
    const rows = data.slice(1);
    
    const colProductCode = headers.indexOf('商品コード');
    const colProductName = headers.indexOf('商品名');
    const colCost = headers.indexOf('V(原価)');  // ★変更: 原価 → V(原価)
    
    if (colProductCode < 0 || colProductName < 0 || colCost < 0) {
      Logger.log('⚠️ 商品マスターシートの列構成が不正です');
      Logger.log(`列: 商品コード=${colProductCode}, 商品名=${colProductName}, V(原価)=${colCost}`);
      return {};
    }
    
    const productMaster = {};
    
    rows.forEach(row => {
      const productCode = row[colProductCode];
      const productName = row[colProductName];
      const cost = Number(row[colCost]) || 0;
      
      if (productCode) {
        productMaster[productCode] = {
          name: productName,
          unitCost: cost  // ★修正: cost → unitCost
        };
      }
    });
    
    Logger.log(`✅ 商品マスター読込: ${Object.keys(productMaster).length}商品`);
    
    return productMaster;
    
  } catch (error) {
    Logger.log('⚠️ 商品マスター読込エラー: ' + error.message);
    return {};
  }
}

/**
 * 在庫データと週次計算の診断
 */
function diagnoseWeeklyInventoryIssue() {
  try {
    Logger.log('=== 在庫データ診断開始 ===');
    
    const ss = SpreadsheetApp.getActiveSpreadsheet();
    const inventorySheet = ss.getSheetByName(MQ_CONFIG.SHEETS.INVENTORY_DATA);
    
    if (!inventorySheet) {
      Logger.log('❌ 在庫データシートが見つかりません');
      return;
    }
    
    Logger.log('✅ 在庫データシートを発見');
    
    // データ読み込み
    const data = inventorySheet.getDataRange().getValues();
    const headers = data[0];
    const rows = data.slice(1);
    
    Logger.log(`\n【ヘッダー情報】`);
    Logger.log(`列数: ${headers.length}`);
    Logger.log(`ヘッダー: [${headers.join(', ')}]`);
    
    Logger.log(`\n【データ情報】`);
    Logger.log(`データ行数: ${rows.length}行`);
    
    if (rows.length === 0) {
      Logger.log('❌ データが入力されていません');
      return;
    }
    
    // 列インデックスを取得
    const colDate = headers.indexOf('計測日');
    const colPeriodType = headers.indexOf('期間タイプ');
    const colProductCode = headers.indexOf('商品コード');
    const colProductName = headers.indexOf('商品名');
    const colQuantity = headers.indexOf('在庫数');
    
    Logger.log(`\n【列インデックス】`);
    Logger.log(`計測日: ${colDate}列目`);
    Logger.log(`期間タイプ: ${colPeriodType}列目`);
    Logger.log(`商品コード: ${colProductCode}列目`);
    Logger.log(`商品名: ${colProductName}列目`);
    Logger.log(`在庫数: ${colQuantity}列目`);
    
    // 最初の5行のサンプルデータを表示
    Logger.log(`\n【サンプルデータ（最初の5行）】`);
    for (let i = 0; i < Math.min(5, rows.length); i++) {
      const row = rows[i];
      Logger.log(`行${i + 2}:`);
      Logger.log(`  計測日: ${row[colDate]} (型: ${typeof row[colDate]})`);
      Logger.log(`  期間タイプ: "${row[colPeriodType]}" (型: ${typeof row[colPeriodType]})`);
      Logger.log(`  商品コード: "${row[colProductCode]}" (型: ${typeof row[colProductCode]})`);
      Logger.log(`  商品名: "${row[colProductName]}" (型: ${typeof row[colProductName]})`);
      Logger.log(`  在庫数: ${row[colQuantity]} (型: ${typeof row[colQuantity]})`);
    }
    
    // 週次データを抽出
    Logger.log(`\n【週次データの抽出】`);
    let weeklyCount = 0;
    let monthlyCount = 0;
    let otherCount = 0;
    let emptyCount = 0;
    
    const dates = new Set();
    const products = new Set();
    
    rows.forEach((row, index) => {
      const periodType = String(row[colPeriodType]).trim();
      const productCode = String(row[colProductCode]).trim();
      const date = row[colDate];
      
      if (!productCode || productCode === '') {
        emptyCount++;
        return;
      }
      
      if (periodType === '週次') {
        weeklyCount++;
        dates.add(Utilities.formatDate(new Date(date), Session.getScriptTimeZone(), 'yyyy-MM-dd'));
        products.add(productCode);
      } else if (periodType === '月次') {
        monthlyCount++;
      } else if (periodType === '') {
        otherCount++;
        Logger.log(`行${index + 2}: 期間タイプが空白 (商品コード: ${productCode})`);
      } else {
        otherCount++;
        Logger.log(`行${index + 2}: 期間タイプが「${periodType}」 (商品コード: ${productCode})`);
      }
    });
    
    Logger.log(`\n【集計結果】`);
    Logger.log(`週次データ: ${weeklyCount}行`);
    Logger.log(`月次データ: ${monthlyCount}行`);
    Logger.log(`その他/空白: ${otherCount}行`);
    Logger.log(`空行: ${emptyCount}行`);
    Logger.log(`合計: ${rows.length}行`);
    
    Logger.log(`\n【週次データの詳細】`);
    Logger.log(`計測日の種類: ${dates.size}日分`);
    Logger.log(`計測日一覧: [${Array.from(dates).sort().join(', ')}]`);
    Logger.log(`商品の種類: ${products.size}商品`);
    
    if (weeklyCount === 0) {
      Logger.log(`\n❌ 【問題発見】週次データが0件です！`);
      Logger.log(`原因候補:`);
      Logger.log(`1. 期間タイプ列に「週次」と入力されていない`);
      Logger.log(`2. 期間タイプ列の前後にスペースが入っている`);
      Logger.log(`3. 全角/半角が混在している`);
    } else if (dates.size < 2) {
      Logger.log(`\n⚠️ 【問題発見】計測日が${dates.size}日分しかありません`);
      Logger.log(`週次回転率の計算には最低2日分の計測日が必要です`);
    } else if (products.size === 0) {
      Logger.log(`\n❌ 【問題発見】商品コードが取得できていません`);
    } else {
      Logger.log(`\n✅ データは正常です。週次計算が可能な状態です。`);
    }
    
    // MQ_CONFIG.SHEETS の確認
    Logger.log(`\n【MQ_CONFIG.SHEETS の確認】`);
    Logger.log(`INVENTORY_DATA: "${MQ_CONFIG.SHEETS.INVENTORY_DATA}"`);
    Logger.log(`WEEKLY_INVENTORY_TURNOVER: "${MQ_CONFIG.SHEETS.WEEKLY_INVENTORY_TURNOVER}"`);
    
    Logger.log('\n=== 診断完了 ===');
    
  } catch (error) {
    Logger.log('❌ 診断エラー: ' + error.message);
    Logger.log('スタックトレース: ' + error.stack);
  }
}

