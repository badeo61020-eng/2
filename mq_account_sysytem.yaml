/**
 * 全シート書式設定（軽量版・最終調整済み）
 */
function formatAllSheets() {
  try {
    Logger.log('📝 全シート書式設定開始');
    SpreadsheetApp.getActiveSpreadsheet().toast('書式設定中...', 'MQ会計システム', 3);
    
    const ss = SpreadsheetApp.getActiveSpreadsheet();
    
    // 書式設定対象シート（優先度順）
    const sheetConfigs = [
      { name: MQ_CONFIG.SHEETS.MONTHLY_ANALYSIS, formatter: formatMonthlyAnalysis },
      { name: MQ_CONFIG.SHEETS.MONTHLY_BREAKEVEN, formatter: formatMonthlyBreakeven },
      { name: MQ_CONFIG.SHEETS.MONTHLY_SUMMARY, formatter: formatMonthlyMySummary },
      { name: MQ_CONFIG.SHEETS.ANNUAL_BREAKEVEN, formatter: formatAnnualBreakeven },
      { name: MQ_CONFIG.SHEETS.PRODUCT_MQ_ANALYSIS, formatter: formatProductMQAnalysis },
      { name: MQ_CONFIG.SHEETS.PRODUCT_MONTHLY_MQ_ANALYSIS, formatter: formatProductMonthlyMQAnalysis }
    ];
    
    let formattedCount = 0;
    for (const config of sheetConfigs) {
      const sheet = ss.getSheetByName(config.name);
      if (sheet && sheet.getLastRow() > 1) {
        try {
          config.formatter(sheet);
          formattedCount++;
          Logger.log(`  ✅ ${config.name} 書式設定完了`);
        } catch (e) {
          Logger.log(`  ⚠️ ${config.name} 書式設定スキップ: ${e.message}`);
        }
      }
    }
    
    SpreadsheetApp.flush(); // 全変更を確定
    Logger.log(`📝 書式設定完了: ${formattedCount}/${sheetConfigs.length}シート`);
    
    // 完了通知
    SpreadsheetApp.getActiveSpreadsheet().toast(
      `${formattedCount}シートの書式設定完了`, 
      'MQ会計システム', 
      5
    );
    
  } catch (error) {
    Logger.log('⚠️ 書式設定エラー: ' + error.message);
    SpreadsheetApp.getActiveSpreadsheet().toast(
      '書式設定でエラーが発生しました', 
      'エラー', 
      5
    );
  }
}

/**
 * メイン実行関数（エラーハンドリング強化版）
 */
function runMQSystemWithIncrementalProcessing() {
  try {
    Logger.log('🚀 MQ会計システム増分処理モード実行開始');
    
    const systemSheet = initializeSystemManage();
    
    const nextEngineLastRow = systemSheet.getRange('C2').getValue() || 1;
    const amazonLastRow = systemSheet.getRange('C3').getValue() || 1;
    
    Logger.log(`📊 システム管理シート記録: NextEngine=${nextEngineLastRow}, Amazon=${amazonLastRow}`);
    
    const nextEngineNewLastRow = integrateNextEngineIncremental(nextEngineLastRow);
    const amazonNewLastRow = integrateAmazonIncremental(amazonLastRow);
    
    if (nextEngineNewLastRow === nextEngineLastRow && amazonNewLastRow === amazonLastRow) {
      Logger.log('⚠️ 新規データが見つかりませんでした');
      Logger.log('📌 集計シートのみ更新する場合は recalculateAnalysisOnly() を実行してください');
      return;
    }
    
    systemSheet.getRange('C2').setValue(nextEngineNewLastRow);
    systemSheet.getRange('C3').setValue(amazonNewLastRow);
    
    Logger.log('📊 MQ分析実行中...');
    executeMQAnalysis();
    
    Logger.log('📊 各種集計実行中...');
    executeDailySettlement();
    executeMonthlyAnalysis();
    executeMonthlyBreakevenAnalysis();
    executeMonthlyMySummary();
    executeAnnualMQAnalysis();
    executeAnnualBreakevenAnalysis();
    
    Logger.log('📊 商品別分析実行中...');
    executeProductMQAnalysis();
    executeProductMonthlyMQAnalysis();
    
    Logger.log('📝 書式設定中...');
    formatAllSheets();
    
    Logger.log('✅ MQ会計システム増分処理完了');
    
    SpreadsheetApp.getUi().alert(
      '✅ 処理完了\n\n' +
      'MQ会計システムの全処理が完了しました。'
    );
    
  } catch (error) {
    Logger.log(`❌ エラー発生: ${error.message}`);
    Logger.log(`スタックトレース: ${error.stack}`);
    
    SpreadsheetApp.getUi().alert(
      '❌ エラー発生\n\n' +
      `エラー内容: ${error.message}\n\n` +
      '詳細はログを確認してください。'
    );
  }
}
