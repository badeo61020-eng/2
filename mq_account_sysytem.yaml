  const consolidatedSheet = ss.getSheetByName(MQ_CONFIG.SHEETS.INTEGRATED_SALES);
  const consolidatedData = consolidatedSheet.getDataRange().getValues();
  const consolidatedHeaders = consolidatedData[0];
  
  const colConsCode = consolidatedHeaders.indexOf('商品コード');
  const colConsQuantity = consolidatedHeaders.indexOf('Q(販売数量)');
  const colConsVariableCost = consolidatedHeaders.indexOf('V(変動費)');
  
  let consolidatedRepaired = 0;
  
  for (let i = 1; i < consolidatedData.length; i++) {
    const row = consolidatedData[i];
    const vValue = String(row[colConsVariableCost]);
    
    if (vValue.includes('#NUM!')) {
      const code = String(row[colConsCode]).trim();
      const quantity = Number(row[colConsQuantity]) || 0;
      const cost = productMaster[code];
      
      if (cost) {
        const variableCost = quantity * cost;
        consolidatedSheet.getRange(i + 1, colConsVariableCost + 1).setValue(variableCost);
        consolidatedRepaired++;
      }
    }
  }
  
  console.log(`✅ 統合売上データ修復: ${consolidatedRepaired}行`);
  
