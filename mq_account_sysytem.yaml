function dedupeIntegratedSalesSheet() {
  const ss = SpreadsheetApp.getActiveSpreadsheet();
  const sh = ss.getSheetByName('統合売上データ');
  if (!sh) throw new Error('統合売上データが見つかりません');

  const values = sh.getDataRange().getValues();
  if (values.length <= 1) {
    Logger.log('⚠️ データがありません');
    return;
  }

  const header = values[0];

  // 列: 0日付,1商品コード,2商品名,3Q,4P,5V,6データソース（あなたの構成）
  const seen = new Set();
  const out = [header];

  let removed = 0;
  let kept = 0;

  for (let i = 1; i < values.length; i++) {
    const r = values[i];

    const date = r[0];
    const code = String(r[1] || '').trim();
    const name = r[2]; // そのまま保持
    const qty  = Number(r[3]) || 0;
    const p    = Number(r[4]) || 0;
    const v    = Number(r[5]) || 0;
    const src  = String(r[6] || '').trim();

    if (!date || !code || !src) continue;

    const d = (date instanceof Date) ? date : new Date(date);
    if (isNaN(d.getTime())) continue;

    const dateKey = Utilities.formatDate(d, 'JST', 'yyyy-MM-dd');
    const key = `${dateKey}|${code}|${src}|${qty}|${p}|${v}`;

    if (seen.has(key)) {
      removed++;
      continue;
    }
    seen.add(key);
    out.push([date, code, name, qty, p, v, src]);
    kept++;
  }

  sh.clearContents();
  sh.getRange(1, 1, out.length, out[0].length).setValues(out);

  Logger.log(`✅ dedupe完了: 残=${kept}行 / 削除=${removed}行（ヘッダー除く）`);
}

/**
 * 月次在庫金額を計算（原価から各商品の在庫金額と合計を計算）
 */
function calculateMonthlyInventoryAmount() {
  try {
    const startTime = Date.now();
    Logger.log('=== 統合在庫データ（計測日・商品コード・在庫数）から集計開始 ===');

    // UIが使えないコンテキスト（トリガー等）でも通知できるようにするユーティリティ
    function notify(message, title) {
      try {
        SpreadsheetApp.getUi().alert(message);
      } catch (e) {
        try {
          SpreadsheetApp.getActiveSpreadsheet().toast(message, title || '通知', 10);
        } catch (e2) {
          Logger.log('通知失敗: ' + e2.message);
        }
      }
    }

    const ss = SpreadsheetApp.getActiveSpreadsheet();
    const consSheet = ss.getSheetByName(MQ_CONFIG.SHEETS.INVENTORY_CONSOLIDATED);
    if (!consSheet) throw new Error('統合在庫データシートが見つかりません。');

    const data = consSheet.getDataRange().getValues();
    if (data.length <= 1) throw new Error('統合在庫データに集計対象のデータがありません。');

    const headers = data[0];
    const colDate = headers.indexOf('計測日');
    const colCode = headers.indexOf('商品コード');
    const colName = headers.indexOf('商品名');
    const colQty = headers.indexOf('在庫数');
    let colAmount = headers.indexOf('在庫金額');

    if (colDate < 0 || colCode < 0 || colQty < 0) {
      throw new Error('統合在庫データの列構成が不正です。少なくとも「計測日」「商品コード」「在庫数」が必要です。');
    }

    // 商品マスターから原価を読込
    const pmSheet = ss.getSheetByName(MQ_CONFIG.SHEETS.PRODUCT_MASTER);
    const costMap = {};
    if (pmSheet) {
      const pm = pmSheet.getDataRange().getValues();
      const ph = pm[0] || [];
      const cCode = ph.indexOf('商品コード');
      const cCost = ph.indexOf('V(原価)');
      if (cCode >= 0 && cCost >= 0) {
        for (let i = 1; i < pm.length; i++) {
          const code = String(pm[i][cCode] || '').trim();
          let cost = pm[i][cCost] || 0;
          if (typeof cost === 'string') cost = Number(cost.replace(/¥|,/g, '')) || 0;
          else cost = Number(cost) || 0;
          if (code) costMap[code] = cost;
        }
      }
    }

    const productTotals = {}; // code -> { productName, totalQty, totalAmount }
    const monthTotals = {}; // yyyy-MM -> totalAmount
    let grandTotal = 0;

    // 在庫金額列がなければヘッダーに追加（シート上）
    if (colAmount < 0) {
      colAmount = headers.length; // 新しい列インデックス（0-based）
      consSheet.getRange(1, colAmount + 1).setValue('在庫金額');
    }

    const amountsToWrite = [];

    for (let i = 1; i < data.length; i++) {
      const row = data[i];
      const date = row[colDate];
      const code = String(row[colCode] || '').trim();
      const name = (colName >= 0) ? row[colName] : '';
      const qty = Number(row[colQty]) || 0;

      if (!code) {
        amountsToWrite.push(['']);
        continue;
      }
      if (!date) {
        amountsToWrite.push(['']);
        continue;
      }

      const dObj = (date instanceof Date) ? date : new Date(date);
      if (isNaN(dObj.getTime())) {
        amountsToWrite.push(['']);
        continue;
      }
      const ym = Utilities.formatDate(dObj, Session.getScriptTimeZone(), 'yyyy-MM');

      const unit = costMap[code] || 0;
      const amount = qty * unit;

      // 行ごとの在庫金額を配列に保持
      amountsToWrite.push([amount]);

      if (!productTotals[code]) productTotals[code] = { productName: name || code, totalQty: 0, totalAmount: 0 };
      productTotals[code].totalQty += qty;
      productTotals[code].totalAmount += amount;

      if (!monthTotals[ym]) monthTotals[ym] = 0;
      monthTotals[ym] += amount;

      grandTotal += amount;
    }

    // 在庫金額を統合在庫データシートに書き込む
    if (amountsToWrite.length > 0) {
      consSheet.getRange(2, colAmount + 1, amountsToWrite.length, 1).setValues(amountsToWrite);
      consSheet.getRange(2, colAmount + 1, amountsToWrite.length, 1).setNumberFormat('#,##0');
    }

    // 出力
    const outName = MQ_CONFIG.SHEETS.INVENTORY_CONSOLIDATED + '集計';
    let out = ss.getSheetByName(outName);
    if (!out) out = ss.insertSheet(outName);
    else out.clearContents();

    const productHeader = ['商品コード', '商品名', '合計在庫数', '合計在庫金額'];
    const prodRows = [productHeader];
    const codes = Object.keys(productTotals).sort();
    codes.forEach(code => {
      const p = productTotals[code];
      prodRows.push([code, p.productName, p.totalQty, p.totalAmount]);
    });
    prodRows.push(['', '', '総合計', grandTotal]);

    const monthHeader = ['年月', '合計在庫金額'];
    const monRows = [monthHeader];
    const months = Object.keys(monthTotals).sort();
    months.forEach(m => monRows.push([m, monthTotals[m]]));
    monRows.push(['総合計', grandTotal]);

    out.getRange(1, 1, prodRows.length, prodRows[0].length).setValues(prodRows);
    const startMon = prodRows.length + 2;
    out.getRange(startMon, 1, monRows.length, monRows[0].length).setValues(monRows);

    out.setColumnWidth(1, 140);
    out.setColumnWidth(2, 220);
    out.setColumnWidth(3, 120);
    out.setColumnWidth(4, 160);
    out.getRange(2, 4, prodRows.length - 1, 1).setNumberFormat('#,##0');
    out.getRange(startMon + 1, 2, monRows.length - 1, 1).setNumberFormat('#,##0');

    notify(`✅ 統合在庫データの集計が完了しました。\n商品数: ${codes.length} 件\n集計月数: ${months.length} ヶ月\n在庫金額合計: ¥${Math.round(grandTotal).toLocaleString('ja-JP')}`, '集計完了');

    Logger.log('✅ 統合在庫データの集計完了');
  } catch (error) {
    Logger.log(`❌ エラー: ${error.message}`);
    notify(`エラーが発生しました:\n${error.message}`, 'エラー');
  }
}

/**
 * 月次在庫金額の詳細分析（商品別の日付別在庫推移）
 */
function analyzeMonthlyInventoryDetail() {
  try {
    const startTime = Date.now();
    Logger.log('=== 月次在庫金額詳細分析開始 ===');
    
    const ss = SpreadsheetApp.getActiveSpreadsheet();
    
    // 必要なシートを取得
    const inventorySheet = ss.getSheetByName(MQ_CONFIG.SHEETS.INVENTORY_DATA);
    const pmSheet = ss.getSheetByName(MQ_CONFIG.SHEETS.PRODUCT_MASTER);
    
    if (!inventorySheet || !pmSheet) {
      throw new Error('在庫データまたは商品マスターシートが見つかりません。');
    }
    
    // 商品マスターから原価を読み込み
    const pmData = pmSheet.getDataRange().getValues();
    const pmHeaders = pmData[0];
    const colPmCode = pmHeaders.indexOf('商品コード');
    const colPmCost = pmHeaders.indexOf('V(原価)');
    
    const costMap = {};
    for (let i = 1; i < pmData.length; i++) {
      const code = String(pmData[i][colPmCode]).trim();
      let cost = pmData[i][colPmCost];
      
      if (typeof cost === 'string') {
        cost = parseInt(cost.replace(/¥|,/g, ''), 10) || 0;
      } else {
        cost = Number(cost) || 0;
      }
      
      if (code) {
        costMap[code] = cost;
      }
    }
    
    // 在庫データを読み込み
    const invData = inventorySheet.getDataRange().getValues();
    const invHeaders = invData[0];
    const colInvDate = invHeaders.indexOf('計測日');
    const colInvCode = invHeaders.indexOf('商品コード');
    const colInvName = invHeaders.indexOf('商品名');
    const colInvQuantity = invHeaders.indexOf('在庫数');
    
    // 商品別の詳細データを集計
    const productDetails = {}; // { '商品コード': [ {date, quantity, cost, amount}, ... ], ... }
    
    for (let i = 1; i < invData.length; i++) {
      const row = invData[i];
      const date = row[colInvDate];
      const code = String(row[colInvCode]).trim();
      const name = row[colInvName];
      const quantity = Number(row[colInvQuantity]) || 0;
      
      if (!date || !code) continue;
      
      const dateObj = (date instanceof Date) ? date : new Date(date);
      if (isNaN(dateObj.getTime())) continue;
      
      const dateStr = Utilities.formatDate(dateObj, Session.getScriptTimeZone(), 'yyyy-MM-dd');
      const cost = costMap[code] || 0;
      const amount = quantity * cost;
      
      if (!productDetails[code]) {
        productDetails[code] = {
          productName: name,
          cost: cost,
          data: []
        };
      }
      
      productDetails[code].data.push({
        date: dateStr,
        quantity: quantity,
        amount: amount
      });
    }
    
    // 分析結果シートを作成
    let analysisSheet = ss.getSheetByName('在庫金額分析');
    if (!analysisSheet) {
      analysisSheet = ss.insertSheet('在庫金額分析');
    } else {
      analysisSheet.clearContents();
    }
    
    const analysisData = [['商品コード', '商品名', '単価（原価）', '日付', '在庫数', '在庫金額']];
    
    const sortedCodes = Object.keys(productDetails).sort();
    
    sortedCodes.forEach(code => {
      const product = productDetails[code];
      const sortedData = product.data.sort((a, b) => new Date(a.date) - new Date(b.date));
      
      sortedData.forEach((item, index) => {
        analysisData.push([
          index === 0 ? code : '',
          index === 0 ? product.productName : '',
          index === 0 ? product.unitCost : '',
          item.date,
          item.quantity,
          item.amount
        ]);
      });
    });
    
    // シートに書き込み
    analysisSheet.getRange(1, 1, analysisData.length, analysisData[0].length).setValues(analysisData);
    
    // 列幅を設定
    analysisSheet.setColumnWidth(1, 120);
    analysisSheet.setColumnWidth(2, 150);
    analysisSheet.setColumnWidth(3, 120);
    analysisSheet.setColumnWidth(4, 100);
    analysisSheet.setColumnWidth(5, 80);
    analysisSheet.setColumnWidth(6, 120);
    
    // ヘッダーをフォーマット
    const headerRange = analysisSheet.getRange(1, 1, 1, 6);
    headerRange.setBackground('#70AD47');
    headerRange.setFontColor('#FFFFFF');
    headerRange.setFontWeight('bold');
    
    // 金額列をカンマ区切りで表示
    analysisSheet.getRange(2, 3, analysisData.length - 1, 1).setNumberFormat('#,##0');
    analysisSheet.getRange(2, 6, analysisData.length - 1, 1).setNumberFormat('#,##0');
    
    const elapsedTime = (Date.now() - startTime) / 1000;
    Logger.log(`⏱️ 処理時間: ${elapsedTime.toFixed(2)}秒`);
    
    SpreadsheetApp.getUi().alert(
      `✅ 月次在庫金額詳細分析が完了しました。\n\n` +
      `分析商品数: ${sortedCodes.length}商品\n` +
      `データ行数: ${analysisData.length - 1}行\n\n` +
      `結果は「在庫金額分析」シートに出力されています。`
    );
    
  } catch (error) {
    Logger.log(`❌ エラー: ${error.message}`);
    SpreadsheetApp.getUi().alert(`エラーが発生しました:\n${error.message}`);
  }
}

