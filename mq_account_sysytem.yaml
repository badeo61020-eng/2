/**
 * 商品別月次MQ分析の実行
 */
function executeProductMonthlyMQAnalysis() {
  const ss = SpreadsheetApp.getActiveSpreadsheet();
  const mqSheet = ss.getSheetByName(MQ_CONFIG.SHEETS.MQ_ANALYSIS);
  
  // MQ分析シートが存在しない場合はスキップ
  if (!mqSheet) {
    Logger.log('⚠️ MQ分析シートが見つかりません。商品別月次MQ分析をスキップします。');
    return;
  }
  
  // 商品別月次MQ分析シートを取得または作成
  let productMonthlySheet = ss.getSheetByName(MQ_CONFIG.SHEETS.PRODUCT_MONTHLY_MQ_ANALYSIS);
  if (!productMonthlySheet) {
    productMonthlySheet = ss.insertSheet(MQ_CONFIG.SHEETS.PRODUCT_MONTHLY_MQ_ANALYSIS);
    Logger.log('✅ 商品別月次MQ分析シートを新規作成');
  }
  
  productMonthlySheet.clear();
  productMonthlySheet.appendRow([
    '年月', '商品コード', '商品名', 'Q（販売数量）', 'P（売上高）', 
    'V（変動費）', 'MQ', 'MQ率(%)', 'ランク'
  ]);
  
  Logger.log('📊 商品別月次MQ分析: データ集計開始...');
  
  const mqData = mqSheet.getDataRange().getValues();
  
  // データが存在しない場合はスキップ
  if (mqData.length <= 1) {
    Logger.log('⚠️ MQ分析データが空です。商品別月次MQ分析をスキップします。');
    return;
  }
  
  const monthlyProductMap = {};
  
  // 固定の列インデックスを使用
  const yearMonthIdx = 1; // 年月
  const skuIdx = 2;       // 商品コード
  const nameIdx = 3;      // 商品名
  const qtyIdx = 4;       // Q(販売数量)
  const salesIdx = 5;     // P(売上高)
  const costIdx = 6;      // V(変動費)
  const mqIdx = 7;        // MQ
  
  for (let i = 1; i < mqData.length; i++) {
    const row = mqData[i];
    const yearMonthValue = row[yearMonthIdx];
    const sku = row[skuIdx];
    const name = row[nameIdx];
    const qty = row[qtyIdx] || 0;
    const sales = row[salesIdx] || 0;
    const cost = row[costIdx] || 0;
    const mq = row[mqIdx] || 0;
    
    let yearMonth;
    if (yearMonthValue instanceof Date) {
      yearMonth = Utilities.formatDate(yearMonthValue, 'JST', 'yyyy/MM');
    } else if (typeof yearMonthValue === 'string') {
      yearMonth = yearMonthValue;
    } else {
      continue;
    }
    
    if (!yearMonth || !sku) continue;
    
    const key = `${yearMonth}_${sku}`;
    
    if (!monthlyProductMap[key]) {
      monthlyProductMap[key] = {
        yearMonth: yearMonth,
        sku: sku,
        name: name,
        totalQty: 0,
        totalSales: 0,
        totalCost: 0,
        totalMQ: 0
      };
    }
    
    monthlyProductMap[key].totalQty += qty;
    monthlyProductMap[key].totalSales += sales;
    monthlyProductMap[key].totalCost += cost;
    monthlyProductMap[key].totalMQ += mq;
    
    // 進捗ログ（500件ごと）
    if (i % 500 === 0) {
      Logger.log(`  処理中... ${i}/${mqData.length}行`);
    }
  }
  
  Logger.log(`📊 商品別月次MQ分析: ${Object.keys(monthlyProductMap).length}件を集計完了`);
  
  const outputData = [];
  for (const key in monthlyProductMap) {
    const data = monthlyProductMap[key];
    const mqRate = data.totalSales > 0 ? data.totalMQ / data.totalSales : 0;
    
    outputData.push([
      data.yearMonth,
      data.sku,
      data.name,
      data.totalQty,
      data.totalSales,
      data.totalCost,
      data.totalMQ,
      mqRate,
      ''
    ]);
  }
  
  Logger.log('📊 商品別月次MQ分析: ソート中...');
  outputData.sort((a, b) => {
    const yearMonthA = String(a[0] || '');
    const yearMonthB = String(b[0] || '');
    const dateCompare = yearMonthA.localeCompare(yearMonthB);
    if (dateCompare !== 0) return dateCompare;
    return b[6] - a[6];
  });
  
  Logger.log('📊 商品別月次MQ分析: ランク付け中...');
  const monthGroups = {};
  for (const row of outputData) {
    const month = row[0];
    if (!monthGroups[month]) monthGroups[month] = [];
    monthGroups[month].push(row);
  }
  
  for (const month in monthGroups) {
    const group = monthGroups[month];
    const topN = Math.ceil(group.length * 0.2);
    
    for (let i = 0; i < group.length; i++) {
      if (i < topN) group[i][8] = 'S';
      else if (i < topN * 2) group[i][8] = 'A';
      else if (i < topN * 3) group[i][8] = 'B';
      else group[i][8] = 'C';
    }
  }
  
  Logger.log('📊 商品別月次MQ分析: シート書き込み中...');
  if (outputData.length > 0) {
    productMonthlySheet.getRange(2, 1, outputData.length, 9).setValues(outputData);
  }
  
  Logger.log(`✅ 商品別月次MQ分析: ${outputData.length}件出力`);
}

