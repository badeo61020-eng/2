/**
 * NextEngine売上データの増分処理（真・増分版）
 * @param {number} lastRow  システム管理シートに保存している前回最終行（データ行番号）
 * @return {number}         今回処理後の最終行（データ行番号）
 */
function integrateNextEngineIncremental(lastRow) {
  console.log('=== NextEngine増分処理開始 ===');

  const ss = SpreadsheetApp.getActiveSpreadsheet();

  // 1) 商品マスター読込（V(原価)）
  const pmSheet = ss.getSheetByName(MQ_CONFIG.SHEETS.PRODUCT_MASTER);
  if (!pmSheet) throw new Error('商品マスターシートが見つかりません');

  const pmData = pmSheet.getDataRange().getValues();
  const pmHeaders = pmData[0];
  const colPmCode = pmHeaders.indexOf('商品コード');
  const colPmCost = pmHeaders.indexOf('V(原価)');
  if (colPmCode === -1 || colPmCost === -1) {
    throw new Error(`商品マスターの列構成が不正です: 商品コード=${colPmCode}, V(原価)=${colPmCost}`);
  }

  const productMaster = {};
  for (let i = 1; i < pmData.length; i++) {
    const code = String(pmData[i][colPmCode]).trim();
    const cost = Number(pmData[i][colPmCost]);
    if (code && !isNaN(cost)) productMaster[code] = cost;
  }
  console.log(`✅ 商品マスター: ${Object.keys(productMaster).length}商品`);

  // 2) NextEngine売上読込
  const neSheet = ss.getSheetByName(MQ_CONFIG.SHEETS.NEXTENGINE_SALES);
  if (!neSheet) throw new Error('NextEngine売上シートが見つかりません');

  const neData = neSheet.getDataRange().getValues();
  const neHeaders = neData[0];

  const colDate = neHeaders.indexOf('日付');
  const colCode = neHeaders.indexOf('商品コード');
  const colName = neHeaders.indexOf('商品名');
  const colQuantity = neHeaders.indexOf('Q(販売数量)');
  const colSales = neHeaders.indexOf('PQ(売上金額)');

  if ([colDate, colCode, colName, colQuantity, colSales].some(i => i === -1)) {
    throw new Error(`NextEngine売上シートの列構成が不正です: 日付=${colDate}, 商品コード=${colCode}, 商品名=${colName}, Q=${colQuantity}, PQ=${colSales}`);
  }

  const currentLastRow = neData.length - 1; // データ行数（ヘッダ除く）
  console.log(`📊 NextEngine売上: ${currentLastRow}行 / 前回最終行=${lastRow}`);

  // 増分が無い場合
  if (currentLastRow <= lastRow) {
    console.log('⚠️ NextEngine: 新規データなし');
    return lastRow;
  }

  // 3) 統合売上データへ追記（重複排除込み）
  const consolidatedSheet = ss.getSheetByName(MQ_CONFIG.SHEETS.INTEGRATED_SALES);
  if (!consolidatedSheet) throw new Error('統合売上データシートが見つかりません');

  const seen = buildExistingIntegratedSalesKeySet_();
  const rowsToAppend = [];

  let generated = 0;
  let skipped = 0;
  let errorCount = 0;

  // ★ここが増分：lastRow+1 から開始
  for (let i = Math.max(1, lastRow + 1); i <= currentLastRow; i++) {
    const row = neData[i];

    const date = row[colDate];
    const code = String(row[colCode]).trim();
    const name = String(row[colName]).trim();
    const quantity = Number(row[colQuantity]) || 0;
    const sales = Number(row[colSales]) || 0;

    // ヘッダ混入対策
    if (code === '商品ｺｰﾄﾞ' || code === '商品コード') continue;
    if (!code || !date) continue;

    const cost = productMaster[code];
    if (!cost) {
      console.warn(`⚠️ 商品マスターに存在しません: ${code}`);
      errorCount++;
      continue;
    }

    const variableCost = quantity * cost;

    const d = (date instanceof Date) ? date : new Date(date);
    const dateKey = Utilities.formatDate(d, 'JST', 'yyyy-MM-dd');
    const key = `${dateKey}|${code}|NextEngine|${quantity}|${sales}|${variableCost}`;

    generated++;

    if (seen.has(key)) {
      skipped++;
      continue;
    }

    seen.add(key);
    rowsToAppend.push([
      date,          // 日付
      code,          // 商品コード
      name,          // 商品名
      quantity,      // Q
      sales,         // P
      variableCost,  // V
      'NextEngine'   // データソース
    ]);
  }

  Logger.log(`統合売上データ(NextEngine): 生成=${generated}, 追記=${rowsToAppend.length}, スキップ=${skipped}, 商品マスター未登録=${errorCount}`);

  if (rowsToAppend.length > 0) {
    const startRow = consolidatedSheet.getLastRow() + 1;
    consolidatedSheet.getRange(startRow, 1, rowsToAppend.length, rowsToAppend[0].length).setValues(rowsToAppend);
    console.log(`✅ 統合売上データ(NextEngine)に${rowsToAppend.length}行を追加`);
  } else {
    console.log(`✅ 統合売上データ(NextEngine) 追加なし（全件スキップ）`);
  }

  console.log('=== NextEngine増分処理完了 ===');
  return currentLastRow; // ★これを systemSheet(C2) に保存する
}

