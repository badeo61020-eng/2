    }
    
    // 月次サマリーシートのフォーマット
    const monthlySummarySheet = ss.getSheetByName(MQ_CONFIG.SHEETS.MONTHLY_SUMMARY);
    if (monthlySummarySheet) {
      formatMonthlyMySummary(monthlySummarySheet);
    }
    
    // 年度損益分岐点シートのフォーマット
    const annualBreakevenSheet = ss.getSheetByName(MQ_CONFIG.SHEETS.ANNUAL_BREAKEVEN);
    if (annualBreakevenSheet) {
