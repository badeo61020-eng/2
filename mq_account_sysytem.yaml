/**
 * 週次在庫回転率を計算
 */
function calculateWeeklyInventoryTurnover() {
  try {
    const startTime = Date.now();
    Logger.log('=== 週次在庫回転率計算開始 ===');
    
    const ss = SpreadsheetApp.getActiveSpreadsheet();
    const inventorySheet = ss.getSheetByName(MQ_CONFIG.SHEETS.INVENTORY_DATA);
    
    if (!inventorySheet) {
      throw new Error('在庫データシートが見つかりません。');
    }
    
    // データ読み込み
    const data = inventorySheet.getDataRange().getValues();
    const headers = data[0];
    const rows = data.slice(1);
    
    Logger.log(`📊 在庫データ読込: ${rows.length}行`);
    
    if (rows.length === 0) {
      throw new Error('在庫データが入力されていません。');
    }
    
    // 列インデックスを取得
    const colDate = headers.indexOf('計測日');
    const colPeriodType = headers.indexOf('期間タイプ');
    const colProductCode = headers.indexOf('商品コード');
    const colProductName = headers.indexOf('商品名');
    const colQuantity = headers.indexOf('在庫数');
    
    Logger.log(`列構成: 計測日=${colDate}, 期間タイプ=${colPeriodType}, 商品コード=${colProductCode}, 商品名=${colProductName}, 在庫数=${colQuantity}`);
    
    // 週次データのみを抽出
    const weeklyData = {};
    
    rows.forEach((row, index) => {
      const date = row[colDate];
      const periodType = row[colPeriodType];
      const productCode = String(row[colProductCode]).trim();  // ★String()で明示的に文字列化
      const productName = row[colProductName];
      const quantity = Number(row[colQuantity]) || 0;
      
      // 空行をスキップ
      if (!productCode || productCode === '') {
        return;
      }
      
      // 週次データのみを対象
      if (periodType !== '週次') {
        return;
      }
      
      // 日付を文字列に変換
      const dateStr = Utilities.formatDate(new Date(date), Session.getScriptTimeZone(), 'yyyy-MM-dd');
      
      // 日付×商品コード別にデータを格納
      const key = `${dateStr}_${productCode}`;
      
      weeklyData[key] = {
        date: dateStr,
        productCode: productCode,  // ★商品コードを保存
        productName: productName,
        quantity: quantity
      };
    });
    
    Logger.log(`✅ 週次データ読込: ${Object.keys(weeklyData).length}件`);
    
    if (Object.keys(weeklyData).length === 0) {
      throw new Error('週次データが見つかりません。');
    }
    
    // 日付でグループ化
    const dateGroups = {};
    Object.values(weeklyData).forEach(item => {
      if (!dateGroups[item.date]) {
        dateGroups[item.date] = [];
      }
      dateGroups[item.date].push(item);
    });
    
    const dates = Object.keys(dateGroups).sort();
    Logger.log(`📅 計測日: ${dates.length}日分 [${dates.join(', ')}]`);
    
    if (dates.length < 2) {
      throw new Error('週次計算には最低2つの計測日が必要です。現在: ' + dates.length + '日分');
    }
    
    // MQデータと商品マスターを読み込み
    Logger.log('📊 MQデータと商品マスターを読み込み中...');
    const mqData = loadMQData();
    const productMaster = loadProductMaster();
    Logger.log(`✅ MQデータ: ${Object.keys(mqData).length}商品`);
    Logger.log(`✅ 商品マスター: ${Object.keys(productMaster).length}商品`);
    
    // 週次回転率を計算
    const results = [];
    
    for (let i = 0; i < dates.length - 1; i++) {
      const startDate = dates[i];
      const endDate = dates[i + 1];
      
      const startInventory = dateGroups[startDate];
      const endInventory = dateGroups[endDate];
      
      // 期間の日数を計算
      const daysDiff = Math.round((new Date(endDate) - new Date(startDate)) / (1000 * 60 * 60 * 24));
      
      Logger.log(`\n=== 期間: ${startDate} 〜 ${endDate} (${daysDiff}日間) ===`);
      
      // 共通商品コードを取得
      const startCodes = new Set(startInventory.map(item => item.productCode));
      const endCodes = new Set(endInventory.map(item => item.productCode));
      const commonCodes = [...startCodes].filter(code => endCodes.has(code));
      
      Logger.log(`共通商品: ${commonCodes.length}商品`);
      
      let calculatedCount = 0;
      
      // 各商品の回転率を計算
      commonCodes.forEach(productCode => {
        const startItem = startInventory.find(item => item.productCode === productCode);
        const endItem = endInventory.find(item => item.productCode === productCode);
        
        if (!startItem || !endItem) return;
        
        const startQty = startItem.quantity;
        const endQty = endItem.quantity;
        const avgQty = (startQty + endQty) / 2;
        
        // 商品マスターから原価を取得
        const product = productMaster[productCode];
        if (!product || !product.unitCost) {
          return;
        }
        
        const cost = product.unitCost;
        const avgValue = avgQty * cost;
        
        // 期間内の売上データを集計
        let soldQty = 0;
        let cogs = 0;
        
        if (mqData[productCode]) {
          mqData[productCode].forEach(record => {
            const recordDate = record.date;
            if (recordDate >= startDate && recordDate <= endDate) {
              soldQty += record.quantity || 0;
              cogs += record.variableCost || 0;
            }
          });
        }
        
        // 在庫変動がない商品はスキップ
        if (startQty === 0 && endQty === 0 && soldQty === 0) {
          return;
        }
        
        // 回転率を計算
        const qtyTurnover = avgQty > 0 ? soldQty / avgQty : 0;
        const valueTurnover = avgValue > 0 ? cogs / avgValue : 0;
        
        const qtyTurnoverDays = qtyTurnover > 0 ? daysDiff / qtyTurnover : 0;
        const valueTurnoverDays = valueTurnover > 0 ? daysDiff / valueTurnover : 0;
        
        results.push({
          period: `${startDate}〜${endDate}`,
          days: daysDiff,
          productCode: productCode,  // ★商品コードを明示的に追加
          productName: product.name || startItem.productName,
          startQty: startQty,
          endQty: endQty,
          avgQty: avgQty,
          avgValue: avgValue,
          soldQty: soldQty,
          cogs: cogs,
          qtyTurnover: qtyTurnover,
          valueTurnover: valueTurnover,
          qtyTurnoverDays: qtyTurnoverDays,
          valueTurnoverDays: valueTurnoverDays
        });
        
        calculatedCount++;
      });
      
      Logger.log(`✅ この期間で計算: ${calculatedCount}商品`);
    }
    
    Logger.log(`\n✅ 計算完了: ${results.length}件`);
    
    if (results.length === 0) {
      throw new Error('計算結果が0件です。商品マスターに原価情報が登録されているか確認してください。');
    }
    
    // 結果を出力
    outputInventoryTurnoverResults(results, MQ_CONFIG.SHEETS.WEEKLY_INVENTORY_TURNOVER);
    
    const elapsedTime = ((Date.now() - startTime) / 1000).toFixed(1);
    Logger.log(`=== 週次在庫回転率計算完了: ${elapsedTime}秒 ===`);
    
    SpreadsheetApp.getActiveSpreadsheet().toast(
      `週次在庫回転率計算完了: ${results.length}件 / 処理時間: ${elapsedTime}秒`,
      '計算完了',
      5
    );
    
    return {
      success: true,
      count: results.length,
      elapsedTime: elapsedTime
    };
    
  } catch (error) {
    Logger.log('❌ エラー: ' + error.message);
    Logger.log('スタックトレース: ' + error.stack);
    
    SpreadsheetApp.getActiveSpreadsheet().toast(
      'エラーが発生しました: ' + error.message,
      'エラー',
      10
    );
    
    throw error;
  }
}


/**
 * MQデータを読み込み（商品コード別・日付別に集計）
 */
/**
 * MQデータを読み込み（商品コード別・日付別に集計）
 */
function loadMQData() {
  try {
    const ss = SpreadsheetApp.getActiveSpreadsheet();
    const sheet = ss.getSheetByName('MQ分析');  // ★変更: 日次決算 → MQ分析
    
    if (!sheet) {
      Logger.log('⚠️ MQ分析シートが見つかりません');
      return {};
    }
    
    const data = sheet.getDataRange().getValues();
    const headers = data[0];
    const rows = data.slice(1);
    
    const colDate = headers.indexOf('日付');
    const colProductCode = headers.indexOf('商品コード');
    const colQuantity = headers.indexOf('Q(販売数量)');
    const colVariableCost = headers.indexOf('V（変動費）');
    
    if (colDate < 0 || colProductCode < 0 || colQuantity < 0 || colVariableCost < 0) {
      Logger.log('⚠️ MQ分析シートの列構成が不正です');
      Logger.log(`列: 日付=${colDate}, 商品コード=${colProductCode}, Q(販売数量)=${colQuantity}, V（変動費）=${colVariableCost}`);
      return {};
    }
    
    const mqData = {};
    
    rows.forEach(row => {
      const date = row[colDate];
      const productCode = row[colProductCode];
      const quantity = Number(row[colQuantity]) || 0;
      const variableCost = Number(row[colVariableCost]) || 0;
      
      if (!productCode) return;
      
      const dateStr = Utilities.formatDate(new Date(date), Session.getScriptTimeZone(), 'yyyy-MM-dd');
      
      if (!mqData[productCode]) {
        mqData[productCode] = [];
      }
      
      mqData[productCode].push({
        date: dateStr,
        quantity: quantity,
        variableCost: variableCost
      });
    });
    
    Logger.log(`✅ MQデータ読込: ${Object.keys(mqData).length}商品`);
    
    return mqData;
    
  } catch (error) {
    Logger.log('⚠️ MQデータ読込エラー: ' + error.message);
    return {};
  }
}


/**
 * 月次在庫回転率の計算
 */
function calculateMonthlyInventoryTurnover() {
  try {
    Logger.log('🔄 月次在庫回転率計算開始...');
    
    // UIが使えないコンテキストでも通知できるユーティリティ
    function notify(message, title) {
      try {
        SpreadsheetApp.getUi().alert(message);
      } catch (e) {
        try {
          SpreadsheetApp.getActiveSpreadsheet().toast(message, title || '通知', 10);
        } catch (e2) {
          Logger.log('通知失敗: ' + e2.message);
        }
      }
    }

    const ss = SpreadsheetApp.getActiveSpreadsheet();
    const inventorySheet = ss.getSheetByName(MQ_CONFIG.SHEETS.INVENTORY_DATA);
    const mqSheet = ss.getSheetByName(MQ_CONFIG.SHEETS.MQ_ANALYSIS);
    const productMasterSheet = ss.getSheetByName(MQ_CONFIG.SHEETS.PRODUCT_MASTER);
    
    // シート存在チェック
    if (!inventorySheet) {
      notify('⚠️ 在庫データシートが見つかりません。\n\n先に「在庫データ初期化」を実行してください。', 'エラー');
      return;
    }

    if (!mqSheet || !productMasterSheet) {
      notify('⚠️ MQ分析シートまたは商品マスターシートが見つかりません。', 'エラー');
      return;
    }
    
    // データ読み込み
    const inventoryData = inventorySheet.getDataRange().getValues();
    const mqData = mqSheet.getDataRange().getValues();
    const productMaster = loadProductMaster();
    
    if (inventoryData.length <= 1) {
      notify('⚠️ 在庫データが入力されていません。\n\n「在庫データ」シートにデータを入力してください。', 'エラー');
      return;
    }
    
    // 在庫データを年月ごとにグループ化（ヘッダーから列を決定、期間タイプ=月次のみ集計）
    const inventoryByMonth = {};
    const invHeaders = inventoryData[0] || [];
    const colDate = invHeaders.indexOf('計測日') >= 0 ? invHeaders.indexOf('計測日') : 0;
    const colPeriod = invHeaders.indexOf('期間タイプ') >= 0 ? invHeaders.indexOf('期間タイプ') : 1;
    const colSku = invHeaders.indexOf('商品コード') >= 0 ? invHeaders.indexOf('商品コード') : 2;
    const colQty = invHeaders.indexOf('在庫数') >= 0 ? invHeaders.indexOf('在庫数') : 4;

    for (let i = 1; i < inventoryData.length; i++) {
      const row = inventoryData[i];
      const dateValue = row[colDate];
      const periodType = String(row[colPeriod] || '').trim();
      const sku = String(row[colSku] || '').trim();
      const qty = parseFloat(row[colQty]) || 0;

      // 月次データのみを集計
      if (periodType !== '月次') continue;

      if (!dateValue || !sku) continue;

      const dateObj = new Date(dateValue);
      if (isNaN(dateObj.getTime())) continue;
      const monthKey = Utilities.formatDate(dateObj, 'JST', 'yyyy/MM');

      if (!inventoryByMonth[monthKey]) inventoryByMonth[monthKey] = {};
      if (!inventoryByMonth[monthKey][sku]) inventoryByMonth[monthKey][sku] = { sum: 0, count: 0 };

      inventoryByMonth[monthKey][sku].sum += qty;
      inventoryByMonth[monthKey][sku].count += 1;
    }

    // 平均在庫数を計算に置換（sum/count -> 平均数値）
    for (const month in inventoryByMonth) {
      for (const sku in inventoryByMonth[month]) {
        const d = inventoryByMonth[month][sku];
        inventoryByMonth[month][sku] = (d.count > 0) ? (d.sum / d.count) : 0;
      }
    }
    
    Logger.log(`📊 在庫データ読込: ${Object.keys(inventoryByMonth).length}ヶ月分`);
    
    // 月次在庫回転率を計算
    const results = calculateInventoryTurnoverByMonth(
      inventoryByMonth,
      mqData,
      productMaster
    );
    
    // 結果を出力
    outputInventoryTurnoverResults(
      results,
      MQ_CONFIG.SHEETS.MONTHLY_INVENTORY_TURNOVER,
      '月次'
    );
    
    Logger.log('✅ 月次在庫回転率計算完了');
    
    notify('✅ 月次在庫回転率計算完了\n\n' +
      '「月次在庫回転率」シートに結果が出力されました。', '完了');
    
  } catch (error) {
    Logger.log(`❌ エラー発生: ${error.message}`);
    Logger.log(`スタックトレース: ${error.stack}`);
    
    notify('❌ エラー発生\n\n' +
      `エラー内容: ${error.message}\n\n` +
      '詳細はログを確認してください。', 'エラー');
  }
}

/**
 * 月次在庫回転率の計算ロジック
 */
function calculateInventoryTurnoverByMonth(inventoryByMonth, mqData, productMaster) {
  const results = [];
  
  // 年月ごとの売上データを集計
  const salesByMonth = {};
  
  // MQ分析データの列インデックスをヘッダーから取得
  const mqHeaders = mqData[0] || [];
  const colMqDate = mqHeaders.indexOf('日付') >= 0 ? mqHeaders.indexOf('日付') : 0;
  const colMqSku = mqHeaders.indexOf('商品コード') >= 0 ? mqHeaders.indexOf('商品コード') : 2;
  const colMqQty = mqHeaders.indexOf('Q(販売数量)') >= 0 ? mqHeaders.indexOf('Q(販売数量)') : 4;
  const colMqCost = mqHeaders.indexOf('V（変動費）') >= 0 ? mqHeaders.indexOf('V（変動費）') : (mqHeaders.indexOf('V(変動費)') >= 0 ? mqHeaders.indexOf('V(変動費)') : 6);

  Logger.log(`MQ分析ヘッダー: ${mqHeaders.join(' | ')}`);
  Logger.log(`列インデックス: 日付=${colMqDate}, SKU=${colMqSku}, 数量=${colMqQty}, 原価=${colMqCost}`);

  for (let i = 1; i < mqData.length; i++) {
    const row = mqData[i];
    const dateValue = row[colMqDate];
    const sku = String(row[colMqSku] || '').trim();
    const qty = parseFloat(row[colMqQty]) || 0;
    const variableCost = parseFloat(row[colMqCost]) || 0;
    
    if (!dateValue || !sku) continue;
    
    const dateObj = new Date(dateValue);
    if (isNaN(dateObj.getTime())) continue;
    const monthKey = Utilities.formatDate(dateObj, 'JST', 'yyyy/MM');
    
    if (!salesByMonth[monthKey]) {
      salesByMonth[monthKey] = {};
    }
    
    if (!salesByMonth[monthKey][sku]) {
      salesByMonth[monthKey][sku] = {
        soldQty: 0,
        cogs: 0 // Cost of Goods Sold (売上原価)
      };
    }
    
    salesByMonth[monthKey][sku].soldQty += qty;
    salesByMonth[monthKey][sku].cogs += variableCost;
    
    if (i <= 5) {
      Logger.log(`MQ行${i}: 日付=${dateValue}, SKU=${sku}, 数量=${qty}, 原価=${variableCost}`);
    }
  }
  
  Logger.log(`集計完了: ${Object.keys(salesByMonth).length}ヶ月分`);
  
  // 各月・各商品の在庫回転率を計算
  for (const month in inventoryByMonth) {
    const inventoryData = inventoryByMonth[month];
    const salesData = salesByMonth[month] || {};
    
    Logger.log(`\n月次 ${month} の在庫回転率計算:`);
    
    for (const sku in inventoryData) {
      const avgInventoryQty = inventoryData[sku];
      const sales = salesData[sku] || { soldQty: 0, cogs: 0 };
      let product = productMaster[sku];

      if (!product) {
        Logger.log(`⚠️ 商品マスターに未登録: ${sku}（単価=0で計算）`);
        product = { name: sku, unitCost: 0 };
      }

      const unitCost = product.unitCost || 0;
      const avgInventoryValue = avgInventoryQty * unitCost;

      // 数量ベース在庫回転率 = 販売数量 ÷ 平均在庫数量
      const qtyTurnover = avgInventoryQty > 0 ? sales.soldQty / avgInventoryQty : 0;

      // 金額ベース在庫回転率 = 売上原価 ÷ 平均在庫金額
      const valueTurnover = avgInventoryValue > 0 ? sales.cogs / avgInventoryValue : 0;

      Logger.log(`  SKU=${sku}: avgQty=${avgInventoryQty}, unitCost=${unitCost}, avgValue=${avgInventoryValue}, cogs=${sales.cogs}, valueTurnover=${valueTurnover}`);

      // 在庫回転日数（月次なので30日で計算）
      const qtyTurnoverDays = qtyTurnover > 0 ? 30 / qtyTurnover : 0;
      const valueTurnoverDays = valueTurnover > 0 ? 30 / valueTurnover : 0;

      results.push({
        period: month,
        days: 30,
        productCode: sku,
        productName: product.name,
        startQty: avgInventoryQty,
        endQty: avgInventoryQty,
        avgQty: avgInventoryQty,
        avgValue: avgInventoryValue,
        soldQty: sales.soldQty,
        cogs: sales.cogs,
        qtyTurnover: qtyTurnover,
        valueTurnover: valueTurnover,
        qtyTurnoverDays: qtyTurnoverDays,
        valueTurnoverDays: valueTurnoverDays
      });
    }
  }
  
  // 期間でソート
  results.sort((a, b) => {
    const periodCompare = a.period.localeCompare(b.period);
    if (periodCompare !== 0) return periodCompare;
    return b.valueTurnover - a.valueTurnover; // 金額ベース回転率降順
  });
  
  return results;
}

/**
 * 在庫回転率結果を出力
 */
function outputInventoryTurnoverResults(results, sheetName) {
  try {
    Logger.log('📝 結果出力開始');
    
    const ss = SpreadsheetApp.getActiveSpreadsheet();
    let sheet = ss.getSheetByName(sheetName);
    
    // シートが存在しない場合は新規作成
    if (!sheet) {
      sheet = ss.insertSheet(sheetName);
      Logger.log('✅ シートを新規作成: ' + sheetName);
    } else {
      sheet.clear();
      Logger.log('✅ 既存シートをクリア: ' + sheetName);
    }
    
    // ヘッダー行を作成
    const headers = [
      '期間',
      '日数',
      '商品コード',
