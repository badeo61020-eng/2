function dedupeIntegratedSales() {
  const ss = SpreadsheetApp.getActiveSpreadsheet();
  const sh = ss.getSheetByName('統合売上データ');
  if (!sh) throw new Error('統合売上データが見つかりません');

  const values = sh.getDataRange().getValues();
  if (values.length <= 1) return;

  const header = values[0];
  const dateIdx=0, codeIdx=1, qtyIdx=3, pIdx=4, vIdx=5, srcIdx=6;

  const seen = new Set();
  const out = [header];

  let removed = 0;

  for (let i=1; i<values.length; i++) {
    const r = values[i];
    const date = r[dateIdx];
    if (!date) continue;

    const d = (date instanceof Date) ? date : new Date(date);
    if (isNaN(d.getTime())) continue;

    const dateKey = Utilities.formatDate(d, 'JST', 'yyyy-MM-dd');
    const code = String(r[codeIdx] || '').trim();
    const src = String(r[srcIdx] || '').trim();
    const qty = (typeof r[qtyIdx]==='number') ? r[qtyIdx] : Number(r[qtyIdx]) || 0;
    const p   = (typeof r[pIdx]==='number')   ? r[pIdx]   : Number(r[pIdx])   || 0;
    const v   = (typeof r[vIdx]==='number')   ? r[vIdx]   : Number(r[vIdx])   || 0;

    const key = `${dateKey}|${code}|${src}|${qty}|${p}|${v}`;
    if (seen.has(key)) {
      removed++;
      continue;
    }
    seen.add(key);
    out.push(r);
  }

  sh.clearContents();
  sh.getRange(1, 1, out.length, out[0].length).setValues(out);

  Logger.log(`✅ 重複排除完了: 削除=${removed} / 出力行(ヘッダー含)=${out.length}`);
}

