        qtyTurnover: qtyTurnover,
        valueTurnover: valueTurnover,
        qtyTurnoverDays: qtyTurnoverDays,
        valueTurnoverDays: valueTurnoverDays
      });
      
      calculatedCount++;
    }
    
    Logger.log(`  ✅ 計算完了: ${calculatedCount}商品`);
  }
  
  // 金額ベース回転率の降順でソート
  results.sort((a, b) => b.valueTurnover - a.valueTurnover);
  
  Logger.log(`\n📊 最終結果: ${results.length}件`);
  
  return results;
}

