    Logger.log('✅ 結果出力完了');
    
  } catch (error) {
    Logger.log('❌ 出力エラー: ' + error.message);
    Logger.log('スタックトレース: ' + error.stack);
    throw error;
  }
}

/**
 * 期間別在庫回転率の計算（週次用）
 * @param {Object} inventoryByDate - 日付ごとの在庫データ
 * @param {Array} mqData - MQ分析データ
 * @param {Object} productMaster - 商品マスター
 * @param {number} periodDays - 期間日数（週次=7）
 */
function calculateInventoryTurnoverByPeriod(inventoryByDate, mqData, productMaster, periodDays) {
  const results = [];
  
  // 日付を昇順にソート
  const dates = Object.keys(inventoryByDate).sort();
  
  Logger.log(`📅 在庫計測日: ${dates.length}日分`);
  dates.forEach(date => Logger.log(`  - ${date}`));
  
  // 隣接する日付ペアを探す（期間日数±2日の範囲）
  for (let i = 0; i < dates.length - 1; i++) {
    const startDate = dates[i];
    const endDate = dates[i + 1];
    
    const startDateObj = new Date(startDate);
    const endDateObj = new Date(endDate);
    
    // 日数差を計算
    const daysDiff = Math.round((endDateObj - startDateObj) / (1000 * 60 * 60 * 24));
    
    // 期間日数±2日の範囲内であればペアとみなす（週次なら5〜9日）
    if (Math.abs(daysDiff - periodDays) <= 2) {
      Logger.log(`\n📊 期間: ${startDate} 〜 ${endDate} (${daysDiff}日間)`);
      
      const startInventory = inventoryByDate[startDate];
      const endInventory = inventoryByDate[endDate];
      
      // 両方の日付に存在する商品のみを対象
      const commonSkus = Object.keys(startInventory).filter(sku => endInventory[sku] !== undefined);
      
      Logger.log(`  対象商品数: ${commonSkus.length}商品`);
      
      // この期間の売上データを集計
      const salesInPeriod = {};
      
      for (let j = 1; j < mqData.length; j++) {
        const row = mqData[j];
        const dateValue = row[0];
        const sku = String(row[2] || '').trim();
        const qty = parseFloat(row[4]) || 0;
        const variableCost = parseFloat(row[6]) || 0;
        
        if (!dateValue || !sku) continue;
        
        const dateObj = new Date(dateValue);
        const dateKey = Utilities.formatDate(dateObj, 'JST', 'yyyy-MM-dd');
        
        // 期間内のデータのみ集計
        if (dateKey >= startDate && dateKey <= endDate) {
          if (!salesInPeriod[sku]) {
            salesInPeriod[sku] = {
              soldQty: 0,
              cogs: 0
            };
          }
          
          salesInPeriod[sku].soldQty += qty;
          salesInPeriod[sku].cogs += variableCost;
        }
      }
      
      Logger.log(`  販売データ: ${Object.keys(salesInPeriod).length}商品に売上あり`);
      
      // 各商品の在庫回転率を計算
      let calculatedCount = 0;
      
      for (const sku of commonSkus) {
        const product = productMaster[sku];
        
        if (!product) {
          Logger.log(`  ⚠️ 商品マスター未登録: ${sku}`);
          continue;
        }
        
        const startQty = startInventory[sku] || 0;
        const endQty = endInventory[sku] || 0;
        const avgInventoryQty = (startQty + endQty) / 2;
        
        const unitCost = product.unitCost;
        const avgInventoryValue = avgInventoryQty * unitCost;
        
        const sales = salesInPeriod[sku] || { soldQty: 0, cogs: 0 };
        
        // 数量ベース在庫回転率 = 販売数量 ÷ 平均在庫数量
        const qtyTurnover = avgInventoryQty > 0 ? sales.soldQty / avgInventoryQty : 0;
        
        // 金額ベース在庫回転率 = 売上原価 ÷ 平均在庫金額
        const valueTurnover = avgInventoryValue > 0 ? sales.cogs / avgInventoryValue : 0;
        
        // 在庫回転日数
        const qtyTurnoverDays = qtyTurnover > 0 ? periodDays / qtyTurnover : 0;
        const valueTurnoverDays = valueTurnover > 0 ? periodDays / valueTurnover : 0;
        
        // 販売実績があるか、在庫変動がある商品のみ出力
        if (sales.soldQty > 0 || Math.abs(startQty - endQty) > 0) {
          results.push({
            period: `${startDate}〜${endDate}`,
            sku: sku,
            productName: product.name,
            avgInventoryQty: avgInventoryQty,
            avgInventoryValue: avgInventoryValue,
            soldQty: sales.soldQty,
            cogs: sales.cogs,
            qtyTurnover: qtyTurnover,
            valueTurnover: valueTurnover,
            qtyTurnoverDays: qtyTurnoverDays,
            valueTurnoverDays: valueTurnoverDays
          });
          
          calculatedCount++;
        }
      }
      
      Logger.log(`  ✅ 計算完了: ${calculatedCount}商品`);
    }
  }
  
  // 金額ベース回転率の降順でソート
  results.sort((a, b) => b.valueTurnover - a.valueTurnover);
  
  Logger.log(`\n📊 最終結果: ${results.length}件`);
  
  return results;
}

