function initializeSystemManage() {
  const ss = SpreadsheetApp.getActiveSpreadsheet(); // 修正: openById → getActiveSpreadsheet
  let sheet = ss.getSheetByName(MQ_CONFIG.SHEETS.SYSTEM_MANAGE);
  
  if (!sheet) {
    sheet = ss.insertSheet(MQ_CONFIG.SHEETS.SYSTEM_MANAGE);
    sheet.getRange('A1').setValue('データソース');
    sheet.getRange('B1').setValue('シート名');
    sheet.getRange('C1').setValue('処理済み行数');
    
    sheet.getRange('A2').setValue('NextEngine');
    sheet.getRange('B2').setValue(MQ_CONFIG.SHEETS.NEXTENGINE_SALES);
    sheet.getRange('C2').setValue(1);
    
    sheet.getRange('A3').setValue('Amazon');
    sheet.getRange('B3').setValue(MQ_CONFIG.SHEETS.AMAZON_SALES);
    sheet.getRange('C3').setValue(1);
    
    Logger.log('✅ システム管理シート作成完了');
  } else {
    const nextEngineProcessed = sheet.getRange('C2').getValue() || 1;
    const amazonProcessed = sheet.getRange('C3').getValue() || 1;
    Logger.log(`📊 既存システム管理シート確認: NextEngine=${nextEngineProcessed}, Amazon=${amazonProcessed}`);
  }
  
  return sheet;
}

function forceResetSystemManage() {
  const ss = SpreadsheetApp.getActiveSpreadsheet(); // 修正: openById → getActiveSpreadsheet
  const existingSheet = ss.getSheetByName(MQ_CONFIG.SHEETS.SYSTEM_MANAGE);
  
  if (existingSheet) {
    ss.deleteSheet(existingSheet);
    Logger.log('🗑️ 既存のシステム管理シートを削除');
  }
  
  const sheet = ss.insertSheet(MQ_CONFIG.SHEETS.SYSTEM_MANAGE);
  sheet.getRange('A1').setValue('データソース');
  sheet.getRange('B1').setValue('シート名');
  sheet.getRange('C1').setValue('処理済み行数');
  
  sheet.getRange('A2').setValue('NextEngine');
  sheet.getRange('B2').setValue(MQ_CONFIG.SHEETS.NEXTENGINE_SALES);
  sheet.getRange('C2').setValue(1);
  
  sheet.getRange('A3').setValue('Amazon');
  sheet.getRange('B3').setValue(MQ_CONFIG.SHEETS.AMAZON_SALES);
  sheet.getRange('C3').setValue(1);
  
  Logger.log('✅ システム管理シートを強制リセット完了（処理済み行数=1）');
}

function completeSystemReset() {
  Logger.log('🔄 完全システムリセット開始...');
  const ss = SpreadsheetApp.getActiveSpreadsheet(); // 修正: openById → getActiveSpreadsheet
  
  const sheetsToDelete = [
    MQ_CONFIG.SHEETS.INTEGRATED_SALES,
    MQ_CONFIG.SHEETS.MQ_ANALYSIS,
    MQ_CONFIG.SHEETS.DAILY_SETTLEMENT,
    MQ_CONFIG.SHEETS.MONTHLY_ANALYSIS,
    MQ_CONFIG.SHEETS.MONTHLY_BREAKEVEN,
    MQ_CONFIG.SHEETS.MONTHLY_SUMMARY,
    MQ_CONFIG.SHEETS.ANNUAL_MQ_ANALYSIS,
    MQ_CONFIG.SHEETS.ANNUAL_BREAKEVEN,
    MQ_CONFIG.SHEETS.PRODUCT_MQ_ANALYSIS,
    MQ_CONFIG.SHEETS.PRODUCT_MONTHLY_MQ_ANALYSIS,
    MQ_CONFIG.SHEETS.SYSTEM_MANAGE
  ];
  
  let deletedCount = 0;
  for (const sheetName of sheetsToDelete) {
    const sheet = ss.getSheetByName(sheetName);
    if (sheet) {
      ss.deleteSheet(sheet);
      deletedCount++;
      Logger.log(`  🗑️ ${sheetName} 削除完了`);
    }
  }
  
  Logger.log(`✅ ${deletedCount}個のシートを削除`);
  
  forceResetSystemManage();
  
  Logger.log('✅ 完全システムリセット完了');
  Logger.log('📌 次に runMQSystemWithIncrementalProcessing() を実行してください');
  
  SpreadsheetApp.getUi().alert('✅ 完全リセット完了\n\nすべてのデータをクリアしました。\n次に「増分処理実行」を実行してください。');
}

// ======================================================================
// 6. MQ会計システム - ユーティリティ関数
// ======================================================================

function getFiscalYear(date) {
  const year = date.getFullYear();
  const month = date.getMonth() + 1;
  
  if (month >= MQ_CONFIG.FISCAL_YEAR_START_MONTH) {
    return `FY${year}`;
  } else {
    return `FY${year - 1}`;
  }
}

