  const sh = ss.getSheetByName('統合売上データ');
  if (!sh) throw new Error('統合売上データが見つかりません');

  const values = sh.getDataRange().getValues();
  Logger.log(`行数(ヘッダー含む): ${values.length}`);

  // 0:日付 1:商品コード 2:商品名 3:Q 4:P 5:V 6:データソース
  const dateIdx=0, codeIdx=1, qtyIdx=3, pIdx=4, vIdx=5, srcIdx=6;

  const keyCount = new Map();
  const ymSumBySrc = {}; // ym -> src -> sumP
  let valid = 0;

  for (let i=1; i<values.length; i++) {
    const r = values[i];
    const date = r[dateIdx];
    if (!date) continue;

    const d = (date instanceof Date) ? date : new Date(date);
    if (isNaN(d.getTime())) continue;

    const ym = Utilities.formatDate(d, 'JST', 'yyyy/MM');
    const code = String(r[codeIdx] || '').trim();
    const src = String(r[srcIdx] || '').trim();
    const qty = (typeof r[qtyIdx]==='number') ? r[qtyIdx] : Number(r[qtyIdx]) || 0;
    const p   = (typeof r[pIdx]==='number')   ? r[pIdx]   : Number(r[pIdx])   || 0;
    const v   = (typeof r[vIdx]==='number')   ? r[vIdx]   : Number(r[vIdx])   || 0;

    // 重複判定キー（近似）
    const dateKey = Utilities.formatDate(d, 'JST', 'yyyy-MM-dd');
    const key = `${dateKey}|${code}|${src}|${qty}|${p}|${v}`;

    keyCount.set(key, (keyCount.get(key) || 0) + 1);

    if (!ymSumBySrc[ym]) ymSumBySrc[ym] = {};
    ymSumBySrc[ym][src] = (ymSumBySrc[ym][src] || 0) + p;

    valid++;
  }

  let dupKeys = 0;
  let dupRows = 0;
  let maxDup = 0;

  for (const [k,c] of keyCount.entries()) {
    if (c > 1) {
      dupKeys++;
      dupRows += (c - 1);
      if (c > maxDup) maxDup = c;
    }
  }

  Logger.log(`有効明細行: ${valid}`);
  Logger.log(`重複キー数: ${dupKeys}`);
  Logger.log(`重複“余剰”行数(=削除候補): ${dupRows}`);
  Logger.log(`最大重複回数(同一キー): ${maxDup}`);

  // 2025/11 のソース別合計を出す（必要なら他月も同様に見れる）
  const targetYm = '2025/11';
  if (ymSumBySrc[targetYm]) {
    Logger.log(`--- ${targetYm} ソース別P合計 ---`);
    Object.keys(ymSumBySrc[targetYm]).sort().forEach(src => {
      Logger.log(`${src}: ${Math.round(ymSumBySrc[targetYm][src])}`);
    });
  } else {
    Logger.log(`${targetYm} のデータが見つかりません`);
  }
}

