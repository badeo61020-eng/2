// ======================================================================
// 4. CSV加工ツール - 実行関数
// ======================================================================

function processCurrentSheet() {
  const sheet = SpreadsheetApp.getActiveSheet();
  const ss = SpreadsheetApp.getActiveSpreadsheet();
  
  // トースト通知で開始を表示
  ss.toast('CSV加工を開始します...', '処理開始', 3);
  
  const data = sheet.getDataRange().getValues();
  
  Logger.log('📊 処理開始: ' + sheet.getName());
  Logger.log('📊 元データ: ' + data.length + '行');
  
  // 1. 行削除
  let filteredData = data.filter((row, index) => {
    if (index === 0) return true;
    
    for (const rule of CSV_CONFIG.ROW_DELETION_RULES) {
      const cellValue = row[rule.column];
      
      if (rule.condition === 'isEmpty' && (cellValue === '' || cellValue === null || cellValue === undefined)) {
        return false;
      }
      if (rule.condition === 'equals' && cellValue == rule.value) {
        return false;
      }
    }
    return true;
  });
  
  Logger.log('📊 行削除後: ' + filteredData.length + '行');
  
  // 2. テキスト置換
  filteredData = filteredData.map(row => {
    CSV_CONFIG.TEXT_REPLACEMENT_RULES.forEach(rule => {
      if (row[rule.column] === rule.searchValue) {
        row[rule.column] = rule.replaceValue;
      }
    });
    return row;
  });
  
  Logger.log('📊 テキスト置換完了');
  
  // 3. 列削除
  const columnsToDelete = CSV_CONFIG.COLUMN_DELETION_RULES.sort((a, b) => b - a);
  filteredData = filteredData.map(row => {
    const newRow = [...row];
    columnsToDelete.forEach(colIndex => {
      newRow.splice(colIndex, 1);
    });
    return newRow;
  });
  
  Logger.log('📊 列削除後: ' + (filteredData[0] ? filteredData[0].length : 0) + '列');
  
  // 4. シート更新
  sheet.clearContents();
  SpreadsheetApp.flush();
  
  if (filteredData.length > 0 && filteredData[0].length > 0) {
    sheet.getRange(1, 1, filteredData.length, filteredData[0].length).setValues(filteredData);
    SpreadsheetApp.flush();
  }
  
  const deletedRows = data.length - filteredData.length;
  const deletedCols = (data[0] ? data[0].length : 0) - (filteredData[0] ? filteredData[0].length : 0);
  
  Logger.log('✅ 処理完了');
  Logger.log('📊 最終結果: ' + filteredData.length + '行 × ' + (filteredData[0] ? filteredData[0].length : 0) + '列');
  
  // トースト通知で完了を表示（自動的に消える）
  ss.toast(
    '削除: ' + deletedRows + '行 / ' + deletedCols + '列　残存: ' + filteredData.length + '行',
    '✅ CSV加工完了',
    10
  );
}

/**
 * CSV加工ツール - メニューから呼び出されるエントリーポイント
 * 実際の処理は processCurrentSheet() に委譲
 */
function processCSVData() {
  return processCurrentSheet();
}

function diagnoseCurrentSheet() {
  const sheet = SpreadsheetApp.getActiveSheet();
  const data = sheet.getDataRange().getValues();
  
  Logger.log('📊 シート診断: ' + sheet.getName());
  Logger.log('総行数: ' + data.length);
  Logger.log('総列数: ' + (data[0] ? data[0].length : 0));
  
  SpreadsheetApp.getUi().alert('📊 診断結果\n\nシート名: ' + sheet.getName() + '\n総行数: ' + data.length + '\n総列数: ' + (data[0] ? data[0].length : 0));
}

function diagnoseColumn13() {
  const sheet = SpreadsheetApp.getActiveSheet();
  const data = sheet.getDataRange().getValues();
  
  let emptyCount = 0;
  let zeroCount = 0;
  let validCount = 0;
  
  for (let i = 1; i < data.length; i++) {
    const cellValue = data[i][13];
    if (cellValue === '' || cellValue === null || cellValue === undefined) {
      emptyCount++;
    } else if (cellValue == 0) {
      zeroCount++;
    } else {
      validCount++;
    }
  }
  
  Logger.log('📊 N列（13列目）診断');
  Logger.log('空白セル: ' + emptyCount);
  Logger.log('0のセル: ' + zeroCount);
  Logger.log('有効データ: ' + validCount);
  
  SpreadsheetApp.getUi().alert('📊 N列診断\n\n空白: ' + emptyCount + '\n0: ' + zeroCount + '\n有効: ' + validCount);
}

function previewDeletionRules() {
  const sheet = SpreadsheetApp.getActiveSheet();
  const data = sheet.getDataRange().getValues();
  
  let deleteCount = 0;
  
  for (let i = 1; i < data.length; i++) {
    for (const rule of CSV_CONFIG.ROW_DELETION_RULES) {
      const cellValue = data[i][rule.column];
      
      if (rule.condition === 'isEmpty' && (cellValue === '' || cellValue === null || cellValue === undefined)) {
        deleteCount++;
        break;
      }
      if (rule.condition === 'equals' && cellValue == rule.value) {
        deleteCount++;
        break;
      }
    }
  }
  
  Logger.log('👁️ 削除プレビュー');
  Logger.log('削除対象行数: ' + deleteCount);
  Logger.log('残存行数: ' + (data.length - 1 - deleteCount));
  
  SpreadsheetApp.getUi().alert('👁️ 削除プレビュー\n\n削除: ' + deleteCount + '行\n残存: ' + (data.length - 1 - deleteCount) + '行');
}

function showConfig() {
  Logger.log('⚙️ CSV_CONFIG設定');
  Logger.log('行削除ルール: ' + CSV_CONFIG.ROW_DELETION_RULES.length + '件');
  Logger.log('列削除ルール: ' + CSV_CONFIG.COLUMN_DELETION_RULES.length + '件');
