  }
  
  Logger.log('\n【3. 列インデックス確認】');
  for (let i = 1; i < Math.min(3, data.length); i++) {
    Logger.log(`\n行${i}のデータ:`);
    Logger.log(`  列0（年月）: ${data[i][0]} (型: ${typeof data[i][0]})`);
    Logger.log(`  列1（仮固定費）: ${data[i][1]} (型: ${typeof data[i][1]})`);
    Logger.log(`  列2（確定固定費）: ${data[i][2]} (型: ${typeof data[i][2]})`);
    if (data[i].length > 3) {
      Logger.log(`  列3: ${data[i][3]} (型: ${typeof data[i][3]})`);
    }
    if (data[i].length > 4) {
      Logger.log(`  列4: ${data[i][4]} (型: ${typeof data[i][4]})`);
    }
  }
  
  Logger.log('\n【4. 固定費選択ロジックのテスト】');
  for (let i = 1; i < Math.min(3, data.length); i++) {
    const yearMonth = data[i][0];
    const tentativeCost = data[i][1];
    const confirmedCost = data[i][2];
    
    Logger.log(`\n行${i} (${yearMonth}):`);
    Logger.log(`  仮固定費: ${tentativeCost} (空白: ${tentativeCost === '' || tentativeCost === null})`);
    Logger.log(`  確定固定費: ${confirmedCost} (空白: ${confirmedCost === '' || confirmedCost === null})`);
    
    // 選択ロジックをテスト
    let costToUse = 0;
    let costType = '';
    
    if (confirmedCost !== '' && confirmedCost !== null && confirmedCost !== undefined) {
      const parsedConfirmed = parseFloat(confirmedCost);
      if (!isNaN(parsedConfirmed) && parsedConfirmed > 0) {
        costToUse = parsedConfirmed;
        costType = '確定';
      }
    }
    
    if (costToUse === 0) {
      if (tentativeCost !== '' && tentativeCost !== null && tentativeCost !== undefined) {
        const parsedTentative = parseFloat(tentativeCost);
        if (!isNaN(parsedTentative) && parsedTentative > 0) {
          costToUse = parsedTentative;
          costType = '仮';
        }
      }
    }
    
    Logger.log(`  → 使用する固定費: ${costToUse.toLocaleString()}円 (${costType})`);
  }
  
  Logger.log('\n【5. loadMonthlyFixedCost()の実行結果】');
  const fixedCostMap = loadMonthlyFixedCost();
  
  Logger.log('\n【6. 最終結果】');
  for (const yearMonth in fixedCostMap) {
    Logger.log(`  ${yearMonth}: ${fixedCostMap[yearMonth].toLocaleString()}円`);
  }
  
  Logger.log('\n診断完了');
}

