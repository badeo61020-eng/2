/**
 * 月次累積分析シート書式設定
 */
function formatMonthlyAnalysis(sheet) {
  try {
    const lastRow = sheet.getLastRow();
    if (lastRow < 2) return;
    
    sheet.setFrozenRows(1);
    
    // ヘッダー書式
    const headerRange = sheet.getRange(1, 1, 1, sheet.getLastColumn());
    headerRange.setBackground('#4A90E2')
              .setFontColor('#FFFFFF')
              .setFontWeight('bold')
              .setHorizontalAlignment('center');
    
    // 会計年度・年月（列A-B）: テキスト形式
    sheet.getRange(2, 1, lastRow - 1, 2).setNumberFormat('@');
    
    // 金額列（列C-F）: カンマ区切り
    sheet.getRange(2, 3, lastRow - 1, 4).setNumberFormat('#,##0');
    
    sheet.autoResizeColumns(1, sheet.getLastColumn());
    SpreadsheetApp.flush(); // 即座に反映
    
  } catch (e) {
    Logger.log('⚠️ formatMonthlyAnalysis エラー: ' + e.message);
  }
}

/**
 * 月次損益分岐点シート書式設定
 */
function formatMonthlyBreakeven(sheet) {
  try {
    const lastRow = sheet.getLastRow();
    if (lastRow < 2) return;
    
    sheet.setFrozenRows(1);
    
    // ヘッダー書式
    const headerRange = sheet.getRange(1, 1, 1, sheet.getLastColumn());
    headerRange.setBackground('#E74C3C')
              .setFontColor('#FFFFFF')
              .setFontWeight('bold')
              .setHorizontalAlignment('center');
    
    // 会計年度・年月: テキスト
    sheet.getRange(2, 1, lastRow - 1, 2).setNumberFormat('@');
    
    // MQ率（列C）: パーセント
    sheet.getRange(2, 3, lastRow - 1, 1).setNumberFormat('0.00%');
    
    // 固定費・損益分岐点売上・実績売上（列D-F）: カンマ区切り
