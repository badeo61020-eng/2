/**
 * 商品マスター読み込み（¥記号対応版）
 */
function loadProductMaster() {
  const ss = SpreadsheetApp.getActiveSpreadsheet();
  const masterSheet = ss.getSheetByName(MQ_CONFIG.SHEETS.PRODUCT_MASTER);
  
  if (!masterSheet) {
    Logger.log('⚠️ 商品マスターシートが見つかりません');
    return {};
  }
  
  const data = masterSheet.getDataRange().getValues();
  const productMap = {};
  
  for (let i = 1; i < data.length; i++) {
    const row = data[i];
    const sku = String(row[0] || '').trim();
    if (!sku) continue;
    
    // 原価の¥記号を除去して数値化（列C: 2）
    let unitCost = row[2];
    if (typeof unitCost === 'string') {
      unitCost = parseFloat(unitCost.replace(/[¥,]/g, '')) || 0;
    } else {
      unitCost = parseFloat(unitCost) || 0;
    }
    
    // 定価の¥記号を除去（列D: 3）
    let price = row[3];
    if (typeof price === 'string') {
      price = parseFloat(price.replace(/[¥,]/g, '')) || 0;
    } else {
      price = parseFloat(price) || 0;
    }
    
    productMap[sku] = {
      name: String(row[1] || '').trim(),
      unitCost: unitCost,
      price: price
    };
  }
  
  Logger.log(`✅ 商品マスター読込: ${Object.keys(productMap).length}件`);
  return productMap;
}

// ======================================================================
// 8. MQ会計システム - MQ分析（製品マスタ連携・軽量版）
// ======================================================================

function executeMQAnalysis() {
  const ss = SpreadsheetApp.getActiveSpreadsheet();
  const integratedSheet = ss.getSheetByName(MQ_CONFIG.SHEETS.INTEGRATED_SALES);
  const productMasterSheet = ss.getSheetByName(MQ_CONFIG.SHEETS.PRODUCT_MASTER);
  const mqSheet = ss.getSheetByName(MQ_CONFIG.SHEETS.MQ_ANALYSIS) || 
                  ss.insertSheet(MQ_CONFIG.SHEETS.MQ_ANALYSIS);
  
  if (!integratedSheet || !productMasterSheet) {
    Logger.log('⚠️ 統合売上データまたは製品マスタが見つかりません');
    return;
  }
  
  // MQ分析シートをクリア
  mqSheet.clear();
  mqSheet.appendRow([
    '日付', '年月', '商品コード', '商品名', 'Q(販売数量)', 
    'P（売上金額）', 'V（変動費）', 'MQ', 'データソース'
  ]);
  
  const integratedData = integratedSheet.getDataRange().getValues();
  const productMasterData = productMasterSheet.getDataRange().getValues();
  
  Logger.log(`📊 統合売上データ: ${integratedData.length}行`);
  Logger.log(`📦 製品マスタ: ${productMasterData.length}行`);
  
  const productMap = {};
  for (let i = 1; i < productMasterData.length; i++) {
    const sku = productMasterData[i][0];
    productMap[sku] = {
      name: productMasterData[i][1],
      unitCost: parseFloat(String(productMasterData[i][2] || '0').replace(/[¥,]/g, '')) || 0,
      unitPrice: parseFloat(String(productMasterData[i][3] || '0').replace(/[¥,]/g, '')) || 0
    };
  }
  
  Logger.log(`📦 製品マスタ読込: ${Object.keys(productMap).length}件`);
  
  // バッチ処理用の配列
  const batchData = [];
  let mqCount = 0;
  let skippedCount = 0;
  
  // 統合売上データの列インデックス
  const dateIdx = 0;       // 日付
  const skuIdx = 1;        // 商品コード
  const nameIdx = 2;       // 商品名
  const qtyIdx = 3;        // Q(販売数量)
  const salesIdx = 4;      // P(売上高)
  const costIdx = 5;       // V(変動費)
  const sourceIdx = 6;     // データソース
  
  for (let i = 1; i < integratedData.length; i++) {
    const row = integratedData[i];
    const date = row[dateIdx];
    const sku = row[skuIdx];
    const name = row[nameIdx];
    const qty = row[qtyIdx] || 0;
    const sales = row[salesIdx] || 0;
    const variableCost = row[costIdx] || 0;
    const source = row[sourceIdx];  // ← これが「NextEngine」または「Amazon」
    
    if (!date || !sku || qty === 0) {
      skippedCount++;
      continue;
    }
    
    // MQ（限界利益）= P - V
    const mq = sales - variableCost;
    
    // 年月を計算
    const yearMonth = Utilities.formatDate(new Date(date), 'JST', 'yyyy/MM');
    
    batchData.push([
      date,
      yearMonth,
      sku,
      name,
      qty,
      sales,
      variableCost,
      mq,
      source  // ← ここに「NextEngine」または「Amazon」が入る
    ]);
    mqCount++;
    
    // 500行ごとにバッチ書き込み
    if (batchData.length >= 500) {
      const lastRow = mqSheet.getLastRow();
      mqSheet.getRange(lastRow + 1, 1, batchData.length, 9).setValues(batchData);
      Logger.log(`  📝 MQ分析: ${batchData.length}行を書き込み中...（累計: ${mqCount}件）`);
      batchData.length = 0;
    }
  }
  
  // 残りのデータを書き込み
  if (batchData.length > 0) {
    const lastRow = mqSheet.getLastRow();
    mqSheet.getRange(lastRow + 1, 1, batchData.length, 9).setValues(batchData);
    Logger.log(`  📝 MQ分析: ${batchData.length}行を書き込み完了`);
  }
  
  Logger.log(`✅ MQ分析: ${mqCount}件のレコードを作成（スキップ: ${skippedCount}件）`);
}


// ======================================================================
// 9. MQ会計システム - 各種集計関数（完全修正版）
// ======================================================================

function executeDailySettlement() {
  const ss = SpreadsheetApp.getActiveSpreadsheet();

  // 集計元を「統合売上データ」に変更
  const srcSheet = ss.getSheetByName(MQ_CONFIG.SHEETS.INTEGRATED_SALES);
  const dailySheet = ss.getSheetByName(MQ_CONFIG.SHEETS.DAILY_SETTLEMENT) ||
                     ss.insertSheet(MQ_CONFIG.SHEETS.DAILY_SETTLEMENT);

  if (!srcSheet) {
    Logger.log('⚠️ 統合売上データシートが見つかりません: ' + MQ_CONFIG.SHEETS.INTEGRATED_SALES);
    return;
  }

  dailySheet.clear();
  dailySheet.appendRow([
    '会計年度', '年月', '日付', 'P（売上金額）', 'V（変動費）',
    'Q（販売数量）', 'MQ', 'F（固定費）', 'G（利益）', 'データソース'
  ]);

  const values = srcSheet.getDataRange().getValues();
  if (values.length <= 1) {
    Logger.log('⚠️ 統合売上データに明細がありません');
    return;
  }

  // 統合売上データの列（あなた提示から確定）
  // 0:日付 1:商品コード 2:商品名 3:Q 4:P 5:V 6:データソース
  const dateIdx = 0;
  const qtyIdx  = 3;
  const salesIdx = 4;
  const costIdx = 5;
  const sourceIdx = 6;

  const fixedCostData = loadMonthlyFixedCost();

  // dateKey(yyyy-MM-dd) 単位で集計
  const dailyMap = {};
  let validRows = 0;

  for (let i = 1; i < values.length; i++) {
    const row = values[i];
    const date = row[dateIdx];
    if (!date) continue;

    const dateObj = (date instanceof Date) ? date : new Date(date);
    if (isNaN(dateObj.getTime())) continue;

    // 数値ガード（文字列や空欄でも壊れない）
    const qty   = (typeof row[qtyIdx] === 'number') ? row[qtyIdx] : Number(row[qtyIdx]) || 0;
    const sales = (typeof row[salesIdx] === 'number') ? row[salesIdx] : Number(row[salesIdx]) || 0;
    const cost  = (typeof row[costIdx] === 'number') ? row[costIdx] : Number(row[costIdx]) || 0;
    const source = row[sourceIdx] || '';

    const dateKey = Utilities.formatDate(dateObj, 'JST', 'yyyy-MM-dd');
    const yearMonth = Utilities.formatDate(dateObj, 'JST', 'yyyy/MM');
    const fiscalYear = getFiscalYear(dateObj);

    if (!dailyMap[dateKey]) {
      dailyMap[dateKey] = {
        fiscalYear,
        yearMonth,
        date: dateObj,
        totalSales: 0,
        totalCost: 0,
        totalQty: 0,
        sources: new Set()
      };
    }

    dailyMap[dateKey].totalSales += sales;
    dailyMap[dateKey].totalCost += cost;
    dailyMap[dateKey].totalQty += qty;
    if (source) dailyMap[dateKey].sources.add(source);

    validRows++;
  }

  // 出力
  const outputData = [];
  const keys = Object.keys(dailyMap).sort(); // yyyy-MM-dd で自然昇順

  for (const k of keys) {
    const data = dailyMap[k];

    const yearMonth = data.yearMonth; // yyyy/MM
    const fixedCost = fixedCostData[yearMonth] || MQ_CONFIG.DEFAULT_FIXED_COST;
    const daysInMonth = new Date(data.date.getFullYear(), data.date.getMonth() + 1, 0).getDate();
    const dailyFixedCost = Math.round(fixedCost / daysInMonth);

    const mq = data.totalSales - data.totalCost;      // MQは日次で P-V
    const profit = mq - dailyFixedCost;

    outputData.push([
      data.fiscalYear,
      yearMonth,
      data.date,
      data.totalSales,
      data.totalCost,
      data.totalQty,
      mq,
      dailyFixedCost,
      profit,
      Array.from(data.sources).join(', ')
    ]);
  }

  if (outputData.length > 0) {
    dailySheet.getRange(2, 1, outputData.length, outputData[0].length).setValues(outputData);
  }

  Logger.log(`✅ 日次決算（統合売上データ起点）: 明細${validRows}行 → ${outputData.length}日分に集計`);
}

function executeMonthlyAnalysis() {
  const ss = SpreadsheetApp.getActiveSpreadsheet();

  const dailySheet = ss.getSheetByName(MQ_CONFIG.SHEETS.DAILY_SETTLEMENT);
  const monthlySheet = ss.getSheetByName(MQ_CONFIG.SHEETS.MONTHLY_ANALYSIS) ||
                       ss.insertSheet(MQ_CONFIG.SHEETS.MONTHLY_ANALYSIS);

  if (!dailySheet) {
    Logger.log('❌ 日次決算シートが見つかりません: ' + MQ_CONFIG.SHEETS.DAILY_SETTLEMENT);
    return;
  }

  monthlySheet.clear();
  monthlySheet.appendRow([
    '会計年度', '年月', 'MQ（限界利益）', 'F（固定費）', 'G（利益）', 'P（売上高）'
  ]);
  
  Logger.log('📋 月次分析シートをクリアして再生成開始...');

  const dailyData = dailySheet.getDataRange().getValues();
  const fixedCostData = loadMonthlyFixedCost();
  
  Logger.log(`📊 固定費マスタから${Object.keys(fixedCostData).length}件の月データを取得`);
  Logger.log(`📅 日次決算シートから${dailyData.length - 1}行のデータを取得`);

  // 日次決算ヘッダー（確定）
  // 0:会計年度 1:年月 2:日付 3:P 4:V 5:Q 6:MQ 7:F 8:G 9:データソース
  const fyIdx = 0;
  const ymIdx = 1;
  const pIdx  = 3;
  const mqIdx = 6;

  const monthlyMap = {};

 for (let i = 1; i < dailyData.length; i++) {
  const row = dailyData[i];

  const fy = row[fyIdx];
  const ymRaw = row[ymIdx];
  if (!fy || !ymRaw) continue;

  // ✅ 年月キーを必ず yyyy/MM に正規化（固定費マスタ keys と一致させる）
  let ym; // yyyy/MM 文字列
  if (ymRaw instanceof Date) {
    ym = Utilities.formatDate(ymRaw, 'JST', 'yyyy/MM');
  } else {
    const s = String(ymRaw).trim();
    // "2025/11/01" -> "2025/11" / "2025-11-01" -> "2025/11" も吸収
    ym = s.match(/^\d{4}\/\d{2}$/)
      ? s
      : s.substring(0, 7).replace(/-/g, '/');
  }

  // ✅ 数値ガード（#NUM!・空欄・文字列混入でも壊れない）
  const pRaw = row[pIdx];
  const mqRaw = row[mqIdx];
  const p  = (typeof pRaw  === 'number') ? pRaw  : (Number(pRaw)  || 0);
  const mq = (typeof mqRaw === 'number') ? mqRaw : (Number(mqRaw) || 0);

  const key = `${fy}_${ym}`;

  if (!monthlyMap[key]) {
    monthlyMap[key] = {
      fiscalYear: fy,
      yearMonth: ym,     // ✅ ここが yyyy/MM で固定されるので固定費参照が安定
      totalMQ: 0,
      totalSales: 0
    };
  }

  monthlyMap[key].totalMQ += mq;
  monthlyMap[key].totalSales += p;
}

  const outputData = [];

for (const key in monthlyMap) {
  const data = monthlyMap[key];

  // ✅ 固定費のヒット状況を確認（ここが本丸）
  const masterFixedCost = fixedCostData[data.yearMonth];
  const fixedCost = (typeof masterFixedCost === 'number')
    ? masterFixedCost
    : MQ_CONFIG.DEFAULT_FIXED_COST;

  // ✅ 1行ログ：固定費がマスタから取れているかを可視化
  Logger.log(
    `DBG MonthlyFixedCost: key=${key}, yearMonth=${data.yearMonth}, ` +
    `master=${masterFixedCost}, used=${fixedCost}` +
    (typeof masterFixedCost === 'number' ? '' : ' (DEFAULT_USED)')
  );

  const profit = data.totalMQ - fixedCost;
  
  // ✅ 追加ログ：固定費と利益の値を確認
  Logger.log(`  → MQ=${data.totalMQ}, F=${fixedCost}, Profit=${profit}, P=${data.totalSales}`);

  outputData.push([
    data.fiscalYear,
    data.yearMonth,
    data.totalMQ,
    fixedCost,
    profit,
    data.totalSales
  ]);
}

  // 年月でソート
  outputData.sort((a, b) => {
    const dateA = new Date(a[1] + '/01');
    const dateB = new Date(b[1] + '/01');
    return dateA - dateB;
  });

  Logger.log(`✅ 月次集計完了: ${outputData.length}件のデータを生成`);
  
  // データ内容を確認（先頭3行）
  for (let i = 0; i < Math.min(3, outputData.length); i++) {
    const row = outputData[i];
    Logger.log(`  行${i+1}: FY=${row[0]}, YM=${row[1]}, MQ=${row[2]}, F=${row[3]}, Profit=${row[4]}, P=${row[5]}`);
  }

  // まとめて書き込み（appendRow連打より安全・高速）
  if (outputData.length > 0) {
    Logger.log(`📝 月次分析シート(${monthlySheet.getName()})に${outputData.length}行を書き込み中...`);
    monthlySheet.getRange(2, 1, outputData.length, outputData[0].length).setValues(outputData);
    Logger.log(`✏️ 書き込み完了`);
  } else {
    Logger.log('⚠️ 出力データが0件のため、シートへの書き込みをスキップしました');
  }

  Logger.log(`✅ 月次累積分析: ${outputData.length}件出力（集計元=日次決算）`);
}

function executeMonthlyBreakevenAnalysis() {
  const ss = SpreadsheetApp.getActiveSpreadsheet();
  const monthlySheet = ss.getSheetByName(MQ_CONFIG.SHEETS.MONTHLY_ANALYSIS);
  const breakevenSheet = ss.getSheetByName(MQ_CONFIG.SHEETS.MONTHLY_BREAKEVEN) || 
                         ss.insertSheet(MQ_CONFIG.SHEETS.MONTHLY_BREAKEVEN);
  
  if (!monthlySheet) return;
  
  // ✅ 月次固定費マスタから最新の固定費を取得
  const fixedCostData = loadMonthlyFixedCost();
  
  breakevenSheet.clear();
  breakevenSheet.appendRow([
    '会計年度', '年月', 'MQ率(%)', 'F（固定費）', '損益分岐点売上', 
    '実績売上', '損益分岐点比率(%)', '安全余裕率(%)'
  ]);
  
  const monthlyData = monthlySheet.getDataRange().getValues();
  
  for (let i = 1; i < monthlyData.length; i++) {
    const row = monthlyData[i];
    const fiscalYear = row[0];
    const yearMonthValue = row[1];
    const mq = row[2] || 0;
    const actualSales = row[5] || 0;
    
    // 年月を文字列に統一
    let yearMonth;
    if (yearMonthValue instanceof Date) {
      yearMonth = Utilities.formatDate(yearMonthValue, 'JST', 'yyyy/MM');
    } else if (typeof yearMonthValue === 'string') {
      yearMonth = yearMonthValue;
    } else {
      yearMonth = String(yearMonthValue);
    }
    
    // ✅ 月次固定費マスタから最新の確定固定費を取得（仮固定費ではなく確定固定費を優先）
    const masterFixedCost = fixedCostData[yearMonth];
    const fixedCost = (typeof masterFixedCost === 'number')
      ? masterFixedCost
      : MQ_CONFIG.DEFAULT_FIXED_COST;
    
    // MQ率（0-1の範囲で保存）
    const mqRate = actualSales > 0 ? mq / actualSales : 0;
    
    // 損益分岐点売上
    const breakevenSales = mqRate > 0 ? fixedCost / mqRate : 0;
    
    // 損益分岐点比率（0-1の範囲で保存、書式設定で%表示）
    const breakevenRatio = breakevenSales > 0 ? actualSales / breakevenSales : 0;
    
    // 安全余裕率（0-1の範囲で保存、書式設定で%表示）
    const safetyMargin = actualSales > 0 ? (actualSales - breakevenSales) / actualSales : 0;
    
    breakevenSheet.appendRow([
      fiscalYear,
      yearMonth,
      mqRate,
      fixedCost,
      breakevenSales,
      actualSales,
      breakevenRatio,
      safetyMargin
    ]);
  }
  
  Logger.log(`✅ 月次損益分岐点分析: ${monthlyData.length - 1}件出力`);
}

function executeMonthlyMySummary() {
  const ss = SpreadsheetApp.getActiveSpreadsheet();
  const monthlySheet = ss.getSheetByName(MQ_CONFIG.SHEETS.MONTHLY_ANALYSIS);
  const summarySheet = ss.getSheetByName(MQ_CONFIG.SHEETS.MONTHLY_SUMMARY) || 
                       ss.insertSheet(MQ_CONFIG.SHEETS.MONTHLY_SUMMARY);
  
  if (!monthlySheet) return;
  
  // ✅ 月次固定費マスタから最新の固定費を取得
  const fixedCostData = loadMonthlyFixedCost();
  
  summarySheet.clear();
  summarySheet.appendRow([
    '会計年度', '年月', '売上高', '限界利益', '固定費', '利益', 
    'MQ率(%)', '前月比売上(%)', '前月比利益(%)'
  ]);
  
  const monthlyData = monthlySheet.getDataRange().getValues();
  let prevSales = 0;
  let prevProfit = 0;
  
  for (let i = 1; i < monthlyData.length; i++) {
    const row = monthlyData[i];
    const fiscalYear = row[0];
    const yearMonthValue = row[1];
    const mq = row[2] || 0;
    const profit = row[4] || 0;
    const sales = row[5] || 0;
    
    // 年月を文字列に統一
    let yearMonth;
    if (yearMonthValue instanceof Date) {
      yearMonth = Utilities.formatDate(yearMonthValue, 'JST', 'yyyy/MM');
    } else if (typeof yearMonthValue === 'string') {
      yearMonth = yearMonthValue;
    } else {
      yearMonth = String(yearMonthValue);
    }
    
    // ✅ 月次固定費マスタから最新の確定固定費を取得（仮固定費ではなく確定固定費を優先）
    const masterFixedCost = fixedCostData[yearMonth];
    const fixedCost = (typeof masterFixedCost === 'number')
      ? masterFixedCost
      : MQ_CONFIG.DEFAULT_FIXED_COST;
    
    const mqRate = sales > 0 ? (mq / sales) : 0;
    const salesGrowth = prevSales > 0 ? ((sales - prevSales) / prevSales) : 0;
    const profitGrowth = prevProfit !== 0 ? ((profit - prevProfit) / Math.abs(prevProfit)) : 0;
    
    summarySheet.appendRow([
      fiscalYear,
      yearMonth,
      sales,
      mq,
      fixedCost,
      profit,
      mqRate,
      salesGrowth,
      profitGrowth
    ]);
    
    prevSales = sales;
    prevProfit = profit;
  }
  
  Logger.log(`✅ 月次サマリー: ${monthlyData.length - 1}件出力`);
}

function executeAnnualMQAnalysis() {
  const ss = SpreadsheetApp.getActiveSpreadsheet();
  const mqSheet = ss.getSheetByName(MQ_CONFIG.SHEETS.MQ_ANALYSIS);
  const annualSheet = ss.getSheetByName(MQ_CONFIG.SHEETS.ANNUAL_MQ_ANALYSIS) || 
                      ss.insertSheet(MQ_CONFIG.SHEETS.ANNUAL_MQ_ANALYSIS);
  
  if (!mqSheet) return;
  
  annualSheet.clear();
  annualSheet.appendRow([
    '会計年度', 'P（売上高）', 'V（変動費）', 'MQ', 'Q（販売数量）'
  ]);
  
  const mqData = mqSheet.getDataRange().getValues();
  const annualMap = {};
  
  // 固定の列インデックスを使用
  const dateIdx = 0;      // 日付
  const qtyIdx = 4;       // Q(販売数量)
  const salesIdx = 5;     // P(売上高)
  const costIdx = 6;      // V(変動費)
  const mqIdx = 7;        // MQ
  
  for (let i = 1; i < mqData.length; i++) {
    const row = mqData[i];
    const date = row[dateIdx];
    const qty = row[qtyIdx] || 0;
    const sales = row[salesIdx] || 0;
    const cost = row[costIdx] || 0;
    const mq = row[mqIdx] || 0;
    
    if (!date) continue;
    
    const dateObj = new Date(date);
    const fiscalYear = getFiscalYear(dateObj);
    
    if (!annualMap[fiscalYear]) {
      annualMap[fiscalYear] = {
        totalSales: 0,
        totalCost: 0,
        totalMQ: 0,
        totalQty: 0
      };
    }
    
    annualMap[fiscalYear].totalSales += sales;
    annualMap[fiscalYear].totalCost += cost;
    annualMap[fiscalYear].totalMQ += mq;
    annualMap[fiscalYear].totalQty += qty;
  }
  
  const outputData = [];
  for (const fiscalYear in annualMap) {
    const data = annualMap[fiscalYear];
    outputData.push([
      fiscalYear,
      data.totalSales,
      data.totalCost,
      data.totalMQ,
      data.totalQty
    ]);
  }
  
  outputData.sort((a, b) => a[0].localeCompare(b[0]));
  
  for (const row of outputData) {
    annualSheet.appendRow(row);
  }
  
  Logger.log(`✅ 年度累積MQ分析: ${outputData.length}件出力`);
}

function executeAnnualBreakevenAnalysis() {
  const ss = SpreadsheetApp.getActiveSpreadsheet();
  const annualMQSheet = ss.getSheetByName(MQ_CONFIG.SHEETS.ANNUAL_MQ_ANALYSIS);
  const breakevenSheet = ss.getSheetByName(MQ_CONFIG.SHEETS.ANNUAL_BREAKEVEN) || 
                         ss.insertSheet(MQ_CONFIG.SHEETS.ANNUAL_BREAKEVEN);
  
  if (!annualMQSheet) return;
  
  breakevenSheet.clear();
  breakevenSheet.appendRow([
    '会計年度', 'MQ率(%)', 'F（固定費）', '損益分岐点売上', 
    '実績売上', '損益分岐点比率(%)', '安全余裕率(%)'
  ]);
  
  const annualData = annualMQSheet.getDataRange().getValues();
  const fixedCostData = loadMonthlyFixedCost();
  
  for (let i = 1; i < annualData.length; i++) {
    const row = annualData[i];
    const fiscalYear = row[0];
    const sales = row[1] || 0;
    const mq = row[3] || 0;
    
    let totalFixedCost = 0;
    for (const yearMonth in fixedCostData) {
      const yearMonthDate = new Date(yearMonth + '/01');
      const fy = getFiscalYear(yearMonthDate);
      if (fy === fiscalYear) {
        totalFixedCost += fixedCostData[yearMonth];
      }
    }
    
    // MQ率（0-1の範囲で保存）
    const mqRate = sales > 0 ? mq / sales : 0;
    
    // 損益分岐点売上
    const breakevenSales = mqRate > 0 ? totalFixedCost / mqRate : 0;
    
    // 損益分岐点比率（0-1の範囲で保存、書式設定で%表示）
    const breakevenRatio = breakevenSales > 0 ? sales / breakevenSales : 0;
    
    // 安全余裕率（0-1の範囲で保存、書式設定で%表示）
    const safetyMargin = sales > 0 ? (sales - breakevenSales) / sales : 0;
    
    breakevenSheet.appendRow([
      fiscalYear,
      mqRate,
      totalFixedCost,
      breakevenSales,
      sales,
      breakevenRatio,
      safetyMargin
    ]);
  }
  
  Logger.log(`✅ 年度損益分岐点分析: ${annualData.length - 1}件出力`);
}

/**
 * 商品別MQ分析の実行（売上高順ソート版）
 */
function executeProductMQAnalysis() {
  const ss = SpreadsheetApp.getActiveSpreadsheet();
  const mqSheet = ss.getSheetByName(MQ_CONFIG.SHEETS.MQ_ANALYSIS);
  
  // MQ分析シートが存在しない場合はスキップ
  if (!mqSheet) {
    Logger.log('⚠️ MQ分析シートが見つかりません。商品別MQ分析をスキップします。');
    return;
  }
  
  // 商品別MQ分析シートを取得または作成
  let outputSheet = ss.getSheetByName(MQ_CONFIG.SHEETS.PRODUCT_MQ_ANALYSIS);
  if (!outputSheet) {
    outputSheet = ss.insertSheet(MQ_CONFIG.SHEETS.PRODUCT_MQ_ANALYSIS);
    Logger.log('✅ 商品別MQ分析シートを新規作成');
  }
  
  const mqData = mqSheet.getDataRange().getValues();
  
  // データが存在しない場合はスキップ
  if (mqData.length <= 1) {
    Logger.log('⚠️ MQ分析データが空です。商品別MQ分析をスキップします。');
    return;
  }
  
  const productMap = new Map();
  
  // 商品別にデータを集計（ヘッダー行をスキップ）
  for (let i = 1; i < mqData.length; i++) {
    const productCode = mqData[i][2]; // 商品コード
    const productName = mqData[i][3]; // 商品名
    const qty = parseFloat(mqData[i][4]) || 0; // Q
    const sales = parseFloat(mqData[i][5]) || 0; // P
    const cost = parseFloat(mqData[i][6]) || 0; // V
    const mq = parseFloat(mqData[i][7]) || 0; // MQ
    
    if (!productCode) continue;
    
    if (!productMap.has(productCode)) {
      productMap.set(productCode, {
        productName: productName,
        totalQty: 0,
        totalSales: 0,
        totalCost: 0,
        totalMQ: 0
      });
    }
    
    const product = productMap.get(productCode);
    product.totalQty += qty;
    product.totalSales += sales;
    product.totalCost += cost;
    product.totalMQ += mq;
  }
  
  // 結果配列の作成
  const results = [];
  
  for (const [productCode, data] of productMap.entries()) {
    // MQ率を正しく計算（小数で保持）
    const mqRate = data.totalSales > 0 ? data.totalMQ / data.totalSales : 0;
    
    results.push({
      productCode: productCode,
      productName: data.productName,
      totalQty: data.totalQty,
      totalSales: data.totalSales,
      totalCost: data.totalCost,
      totalMQ: data.totalMQ,
      mqRate: mqRate
    });
  }
  
  // 【重要】売上高でソート（降順）
  results.sort((a, b) => b.totalSales - a.totalSales);
  
  // ランク付け（売上高順位に基づく）
  const totalProducts = results.length;
  results.forEach((item, index) => {
    const percentile = (index + 1) / totalProducts;
    if (percentile <= 0.2) item.rank = 'S';
    else if (percentile <= 0.4) item.rank = 'A';
    else if (percentile <= 0.6) item.rank = 'B';
    else if (percentile <= 0.8) item.rank = 'C';
    else item.rank = 'D';
  });
  
  // シートへの出力
  outputSheet.clear();
  
  // ヘッダー行
  const headers = [
    '商品コード',
    '商品名',
    'Q（販売数量）',
    'P（売上高）',
    'V（変動費）',
    'MQ',
    'MQ率(%)',
    'ランク'
  ];
  
  outputSheet.getRange(1, 1, 1, headers.length).setValues([headers]);
  
  // データ行（MQ率を数値として出力）
  if (results.length > 0) {
    const outputData = results.map(item => [
      item.productCode,
      item.productName,
      item.totalQty,
      item.totalSales,
      item.totalCost,
      item.totalMQ,
      item.mqRate,
      item.rank
    ]);
    
    outputSheet.getRange(2, 1, outputData.length, headers.length).setValues(outputData);
    
    // 数値列のフォーマット
    const dataStartRow = 2;
    
    // Q, P, V, MQ列を数値フォーマット（カンマ区切り）
    outputSheet.getRange(dataStartRow, 3, outputData.length, 4)
      .setNumberFormat('#,##0');
    
    // MQ率列をパーセント表示（小数点2桁）
    outputSheet.getRange(dataStartRow, 7, outputData.length, 1)
      .setNumberFormat('0.00%');
  }
  
  Logger.log(`✅ 商品別MQ分析完了: ${results.length}商品（売上高順）`);
}


// ======================================================================
// 10. ユーティリティ関数
// ======================================================================

/**
 * 月別固定費の読み込み（仮固定費・確定固定費対応版）
 * 
 * 優先順位:
 * 1. 確定固定費（列C）に値がある → 確定固定費を使用
 * 2. 確定固定費が空白 → 仮固定費（列B）を使用
 * 3. 両方とも空白 → デフォルト値を使用
 */
function loadMonthlyFixedCost() {
  const ss = SpreadsheetApp.getActiveSpreadsheet();
  const fixedCostSheet = ss.getSheetByName(MQ_CONFIG.SHEETS.MONTHLY_FIXED_COST);
  
  const fixedCostMap = {};
  
  if (fixedCostSheet) {
    const data = fixedCostSheet.getDataRange().getValues();
    let loadedMonths = 0;
    
    Logger.log('📊 月別固定費マスタ読込開始');
    
    for (let i = 1; i < data.length; i++) {
      const yearMonth = data[i][0];    // 列A: 年月
      const tentativeCost = data[i][1]; // 列B: 仮固定費
      const confirmedCost = data[i][2]; // 列C: 確定固定費
      
      if (!yearMonth) continue;
      
      // 年月のフォーマット統一
      let formattedYearMonth;
      if (yearMonth instanceof Date) {
        formattedYearMonth = Utilities.formatDate(yearMonth, 'JST', 'yyyy/MM');
      } else if (typeof yearMonth === 'string') {
        const parts = yearMonth.split('/');
        if (parts.length === 2) {
          formattedYearMonth = yearMonth;
        } else {
          try {
            formattedYearMonth = Utilities.formatDate(new Date(yearMonth), 'JST', 'yyyy/MM');
          } catch (e) {
            Logger.log(`⚠️ 年月フォーマットエラー: ${yearMonth}`);
            continue;
          }
        }
      }
      
      if (!formattedYearMonth) continue;
      
      // 固定費の選択ロジック
      let costToUse = 0;
      let costType = '';
      
      // 確定固定費のチェック（空白、null、0ではない）
      if (confirmedCost !== '' && confirmedCost !== null && confirmedCost !== undefined) {
        const parsedConfirmed = parseFloat(confirmedCost);
        if (!isNaN(parsedConfirmed) && parsedConfirmed > 0) {
          costToUse = parsedConfirmed;
          costType = '確定';
        }
      }
      
      // 確定固定費がない場合、仮固定費をチェック
      if (costToUse === 0) {
        if (tentativeCost !== '' && tentativeCost !== null && tentativeCost !== undefined) {
          const parsedTentative = parseFloat(tentativeCost);
          if (!isNaN(parsedTentative) && parsedTentative > 0) {
            costToUse = parsedTentative;
            costType = '仮';
          }
        }
      }
      
      // 両方とも空白の場合はデフォルト値
      if (costToUse === 0) {
        costToUse = MQ_CONFIG.DEFAULT_FIXED_COST;
        costType = 'デフォルト';
      }
      
      fixedCostMap[formattedYearMonth] = costToUse;
      loadedMonths++;
      
      Logger.log(`  ${formattedYearMonth}: ${costType}固定費 = ${costToUse.toLocaleString()}円`);
    }
    
    Logger.log(`✅ 月次固定費マスタ読込完了: ${loadedMonths}ヶ月分`);
  } else {
    Logger.log('⚠️ 月次固定費マスタが見つかりません。デフォルト値を使用します。');
  }
  
  return fixedCostMap;
}

