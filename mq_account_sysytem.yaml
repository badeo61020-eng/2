      const startQty = startInventory[sku] || 0;
      const endQty = endInventory[sku] || 0;
      const avgInventoryQty = (startQty + endQty) / 2;
      
      const unitCost = product.unitCost;
      const avgInventoryValue = avgInventoryQty * unitCost;
      
      const sales = salesInPeriod[sku] || { soldQty: 0, cogs: 0 };
      
      // 数量ベース在庫回転率 = 販売数量 ÷ 平均在庫数量
      const qtyTurnover = avgInventoryQty > 0 ? sales.soldQty / avgInventoryQty : 0;
      
      // 金額ベース在庫回転率 = 売上原価 ÷ 平均在庫金額
      const valueTurnover = avgInventoryValue > 0 ? sales.cogs / avgInventoryValue : 0;
      
      // 在庫回転日数
      const qtyTurnoverDays = qtyTurnover > 0 ? daysDiff / qtyTurnover : 0;
      const valueTurnoverDays = valueTurnover > 0 ? daysDiff / valueTurnover : 0;
      
      results.push({
        period: `${startDate}〜${endDate}`,
        periodDays: daysDiff,
        sku: sku,
        productName: product.name,
        startInventoryQty: startQty,
        endInventoryQty: endQty,
        avgInventoryQty: avgInventoryQty,
        avgInventoryValue: avgInventoryValue,
        soldQty: sales.soldQty,
