  const pmHeaders = pmData[0];
  
  const colPmCode = pmHeaders.indexOf('商品コード');
  const colPmCost = pmHeaders.indexOf('V(原価)');
  
  const productMaster = {};
  for (let i = 1; i < pmData.length; i++) {
    const code = String(pmData[i][colPmCode]).trim();
    const cost = Number(pmData[i][colPmCost]);
    if (code && !isNaN(cost) && cost > 0) {
      productMaster[code] = cost;
    }
  }
  
  console.log(`✅ 商品マスター: ${Object.keys(productMaster).length}商品`);
  
  // 2. 統合売上データを修復
