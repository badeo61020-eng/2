/**
 * データ診断: 売上の内訳を確認
 */
function diagnoseSalesData() {
  const ss = SpreadsheetApp.getActiveSpreadsheet();
  
  // 1. 統合売上データの確認
  const integratedSheet = ss.getSheetByName(MQ_CONFIG.SHEETS.INTEGRATED_SALES);
  if (integratedSheet) {
    const integratedData = integratedSheet.getDataRange().getValues();
    Logger.log('=== 統合売上データ ===');
    Logger.log(`総行数: ${integratedData.length - 1}件`);
    
    let totalSales = 0;
    let nov2025Sales = 0;
    let dec2025Sales = 0;
    
    for (let i = 1; i < integratedData.length; i++) {
      const row = integratedData[i];
      const dateValue = row[0]; // 受注日
      const sales = parseFloat(row[5]) || 0; // P（売上高）
      
      totalSales += sales;
      
      if (dateValue instanceof Date) {
        const year = dateValue.getFullYear();
        const month = dateValue.getMonth() + 1;
        
        if (year === 2025 && month === 11) {
          nov2025Sales += sales;
        } else if (year === 2025 && month === 12) {
          dec2025Sales += sales;
        }
      }
    }
    
    Logger.log(`総売上: ${totalSales.toLocaleString()}円`);
    Logger.log(`2025年11月売上: ${nov2025Sales.toLocaleString()}円`);
    Logger.log(`2025年12月売上: ${dec2025Sales.toLocaleString()}円`);
  }
  
  // 2. NextEngineの確認
  const neSheet = ss.getSheetByName(MQ_CONFIG.SHEETS.NEXTENGINE);
  if (neSheet) {
    const neData = neSheet.getDataRange().getValues();
    Logger.log('\n=== NextEngineデータ ===');
    Logger.log(`総行数: ${neData.length - 1}件`);
    
    // サンプル行を表示
    if (neData.length > 1) {
      Logger.log('サンプル行（1行目）:');
      Logger.log(JSON.stringify(neData[1]));
    }
  }
  
  // 3. Amazonの確認
  const amazonSheet = ss.getSheetByName(MQ_CONFIG.SHEETS.AMAZON);
  if (amazonSheet) {
    const amazonData = amazonSheet.getDataRange().getValues();
    Logger.log('\n=== Amazonデータ ===');
    Logger.log(`総行数: ${amazonData.length - 1}件`);
    
    // サンプル行を表示
    if (amazonData.length > 1) {
      Logger.log('サンプル行（1行目）:');
      Logger.log(JSON.stringify(amazonData[1]));
    }
  }
  
  // 4. MQ分析の確認
  const mqSheet = ss.getSheetByName(MQ_CONFIG.SHEETS.MQ_ANALYSIS);
  if (mqSheet) {
    const mqData = mqSheet.getDataRange().getValues();
    Logger.log('\n=== MQ分析データ ===');
    Logger.log(`総行数: ${mqData.length - 1}件`);
    
    let totalMQSales = 0;
    for (let i = 1; i < mqData.length; i++) {
      const sales = parseFloat(mqData[i][5]) || 0; // P列
      totalMQSales += sales;
    }
    Logger.log(`MQ分析の総売上: ${totalMQSales.toLocaleString()}円`);
  }
  
  // 5. 日次決算の確認
  const dailySheet = ss.getSheetByName(MQ_CONFIG.SHEETS.DAILY_SETTLEMENT);
  if (dailySheet) {
    const dailyData = dailySheet.getDataRange().getValues();
    Logger.log('\n=== 日次決算データ ===');
    Logger.log(`総日数: ${dailyData.length - 1}日`);
    
    // 日付範囲を確認
    if (dailyData.length > 1) {
      Logger.log(`開始日: ${dailyData[1][1]}`);
      Logger.log(`終了日: ${dailyData[dailyData.length - 1][1]}`);
    }
  }
  
  Logger.log('\n診断完了！');
}

